<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>One — Found Footage Scratch Film v3</title>
<style>
html,body{margin:0;height:100%;background:#050403;font:400 12px/22px Arial,sans-serif;color:#332e27}
#wrap{position:relative;width:100%;height:100vh;overflow:hidden;background:#030201}
canvas{position:absolute;inset:0;width:100%;height:100%}
#scene{z-index:1}
#symbols{z-index:2;mix-blend-mode:screen;opacity:.86}
#damage{z-index:3;mix-blend-mode:screen;opacity:.94}
#dirt{z-index:4;mix-blend-mode:multiply;opacity:.62}
#vignette{position:absolute;inset:-5%;z-index:5;pointer-events:none;background:radial-gradient(ellipse at center,rgba(255,241,202,.05) 0%,rgba(0,0,0,0) 42%,rgba(0,0,0,.76) 100%),linear-gradient(90deg,rgba(0,0,0,.52),transparent 13%,transparent 87%,rgba(0,0,0,.52))}
#frame{position:absolute;inset:0;z-index:6;pointer-events:none;box-shadow:inset 0 0 0 1px rgba(255,241,203,.05),inset 0 0 80px rgba(0,0,0,.88)}
.ui{position:absolute;left:0;right:0;bottom:0;z-index:20;display:flex;align-items:center;gap:.75rem;padding:.6rem .8rem;background:rgba(239,232,213,.88);opacity:0;transform:translateY(8px);transition:.25s ease;pointer-events:none}
#wrap:hover .ui{opacity:1;transform:none;pointer-events:auto}
.btn{all:unset;cursor:pointer;width:36px;height:36px;border-radius:9999px;text-align:center;background:rgba(0,0,0,.06)}
.label{min-width:52px;text-align:right;opacity:.85}.grow{flex:1}.spacer{width:8px}
input[type=range]{appearance:none;height:4px;width:240px;background:rgba(0,0,0,.18);border-radius:999px}
input[type=range]::-webkit-slider-thumb{appearance:none;width:14px;height:14px;border-radius:50%;background:#3e3a33}
.starter{position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;background:radial-gradient(circle at center,rgba(255,239,196,.08),rgba(0,0,0,.78)),linear-gradient(180deg,rgba(0,0,0,.20),rgba(0,0,0,.72))}
.title{font-size:clamp(28px,4vw,50px);color:#efe4cd;letter-spacing:.13em;text-transform:uppercase;text-shadow:0 2px 20px rgba(0,0,0,.95)}
.subtitle{color:rgba(239,228,205,.72);letter-spacing:.08em;text-transform:uppercase;margin-top:-18px}
.play-oval{all:unset;cursor:pointer;display:flex;align-items:center;justify-content:center;width:140px;height:50px;border-radius:9999px;background:rgba(220,207,163,.72);border:2px solid rgba(105,92,55,.9);box-shadow:0 6px 24px rgba(0,0,0,.5)}
.play-oval svg{width:20px;height:20px;fill:#4a4021}
.hiddenVideo{position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;pointer-events:none}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="scene"></canvas>
  <canvas id="symbols"></canvas>
  <canvas id="damage"></canvas>
  <canvas id="dirt"></canvas>
  <div id="vignette"></div><div id="frame"></div>

  <div class="ui">
    <button id="play" class="btn">▶</button><span id="time" class="label">0:00</span>
    <input id="seek" type="range" min="0" max="1" step="0.001" value="0" class="grow">
    <span id="dur" class="label">5:24</span><div class="spacer"></div>
    <input id="vol" type="range" min="0" max="1" step="0.01" value="0.9" style="width:110px">
  </div>

  <div id="starter" class="starter">
    <div class="title">One</div>
    <div class="subtitle">found footage scratch film v3</div>
    <button id="startBtn" class="play-oval" aria-label="Play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
  </div>

  <audio id="player" preload="auto" crossorigin="anonymous"><source src="one.mp3" type="audio/mpeg"></audio>
</div>

<script>
const BPM=140, TRACK_SECONDS=324, BEATS_PER_BAR=4;
const CLIP_URLS=[
 "https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/mayor.mp4",
 "https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/fete1.mp4",
 "https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/fete2.mp4",
 "https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/hatman.mp4",
 "https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/poolparty.mp4",
 "https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/clown.mp4",
 "https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/dance.mp4",
 "https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/swimming.mp4",
 "https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/NY.mp4"
];

const ACTS=[
 {start:0,end:70,damage:.10,paint:.04,decay:.07,cuts:9,loops:.06,symbols:.08},
 {start:70,end:150,damage:.25,paint:.18,decay:.18,cuts:6,loops:.16,symbols:.24},
 {start:150,end:240,damage:.43,paint:.48,decay:.38,cuts:4,loops:.30,symbols:.50},
 {start:240,end:324,damage:.62,paint:.74,decay:.66,cuts:3,loops:.45,symbols:.72}
];

const wrap=document.getElementById('wrap');
const sceneCanvas=document.getElementById('scene'), symbolCanvas=document.getElementById('symbols'), damageCanvas=document.getElementById('damage'), dirtCanvas=document.getElementById('dirt');
const scene=sceneCanvas.getContext('2d',{alpha:false}), sym=symbolCanvas.getContext('2d',{alpha:true}), damage=damageCanvas.getContext('2d',{alpha:true}), dirt=dirtCanvas.getContext('2d',{alpha:true});
const audio=document.getElementById('player'), starter=document.getElementById('starter'), startBtn=document.getElementById('startBtn'), btnPlay=document.getElementById('play');
const rSeek=document.getElementById('seek'), rVol=document.getElementById('vol'), tTime=document.getElementById('time'), tDur=document.getElementById('dur');

let audioCtx,sourceNode,gainNode,analyser,freqData,timeData,isPlaying=false;
let videos=[],currentVideo=0,nextCutAt=0,frame=0,lastBeat=-1,lastBar=-1;
let gateX=0,gateY=0,hardFlash=0,stutterFrames=0,loopMode=0,loopTime=0;
let scratches=[],symbols=[],burns=[],paintSmears=[],motifMemory=[],dustSeed=0;

const pad=s=>(s<10?'0':'')+s;
const fmt=t=>(!isFinite(t)?'0:00':((t/60)|0)+':'+pad((t%60)|0));
const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));
const rand=(min,max)=>min+Math.random()*(max-min);
function getAct(t){return ACTS.find(a=>t>=a.start&&t<a.end)||ACTS[ACTS.length-1];}

function resize(){
 const r=wrap.getBoundingClientRect(),dpr=Math.min(window.devicePixelRatio||1,2);
 [sceneCanvas,symbolCanvas,damageCanvas,dirtCanvas].forEach(c=>{c.width=Math.floor(r.width*dpr);c.height=Math.floor(r.height*dpr);c.style.width=r.width+'px';c.style.height=r.height+'px';});
 [scene,sym,damage,dirt].forEach(cx=>cx.setTransform(dpr,0,0,dpr,0,0));
}
window.addEventListener('resize',resize,{passive:true});resize();

function makeVideos(){
 videos=CLIP_URLS.map(url=>{
  const v=document.createElement('video');
  v.className='hiddenVideo';v.src=url;v.crossOrigin='anonymous';v.muted=true;v.loop=true;v.playsInline=true;v.preload='auto';
  v.playbackRate=.55+Math.random()*.38;
  document.body.appendChild(v); return v;
 });
}
async function startVideos(){for(const v of videos){try{await v.play();}catch(e){console.warn('Video play issue',v.src,e);}}}

function chooseNewVideo(){
 if(!videos.length)return;
 let n=currentVideo; while(n===currentVideo&&videos.length>1)n=Math.floor(Math.random()*videos.length);
 currentVideo=n;
 const v=videos[currentVideo];
 if(v.duration&&isFinite(v.duration)){try{v.currentTime=rand(0,Math.max(.25,v.duration-1.2));}catch(e){}}
 v.playbackRate=.48+Math.random()*.42;
 hardFlash=.10+Math.random()*.10;
}

function setupAudio(){
 const AC=window.AudioContext||window.webkitAudioContext; audioCtx=new AC();
 sourceNode=audioCtx.createMediaElementSource(audio); gainNode=audioCtx.createGain(); gainNode.gain.value=Number(rVol.value);
 analyser=audioCtx.createAnalyser(); analyser.fftSize=2048; analyser.smoothingTimeConstant=.70;
 freqData=new Uint8Array(analyser.frequencyBinCount); timeData=new Uint8Array(analyser.fftSize);
 sourceNode.connect(gainNode); gainNode.connect(analyser); gainNode.connect(audioCtx.destination);
}
function bandAverage(fromHz,toHz){
 if(!freqData||!audioCtx)return 0; const ny=audioCtx.sampleRate/2, s=Math.floor((fromHz/ny)*freqData.length), e=Math.floor((toHz/ny)*freqData.length);
 let sum=0,count=0; for(let i=s;i<=e&&i<freqData.length;i++){sum+=freqData[i];count++;} return count?sum/(count*255):0;
}
function rms(){
 if(!timeData)return 0; let sum=0; for(let i=0;i<timeData.length;i++){const v=(timeData[i]-128)/128;sum+=v*v;} return Math.sqrt(sum/timeData.length);
}

function drawVideoCover(ctx,v,w,h,alpha=1,dx=0,dy=0,scale=1){
 if(!v||v.readyState<2)return false;
 const vw=v.videoWidth||16,vh=v.videoHeight||9,s=Math.max(w/vw,h/vh)*scale,dw=vw*s,dh=vh*s;
 ctx.save();ctx.globalAlpha=alpha;ctx.drawImage(v,(w-dw)/2+dx,(h-dh)/2+dy,dw,dh);ctx.restore();return true;
}

function drawScene(w,h,t,act,bass,mids,energy){
 scene.fillStyle=`rgba(6,4,2,${.045+act.decay*.026})`;
 scene.fillRect(0,0,w,h);
 const v=videos[currentVideo], v2=videos[(currentVideo+1)%Math.max(1,videos.length)];

 if(loopMode>0&&v&&v.duration){
  loopMode--;
  try{v.currentTime=loopTime+Math.sin(loopMode*.9)*.11;}catch(e){}
 }else if(stutterFrames>0&&v&&v.duration){
  stutterFrames--; try{v.currentTime=Math.max(0,v.currentTime-.032);}catch(e){}
 }

 const gx=gateX+rand(-.3,.3), gy=gateY+rand(-.3,.3), zoom=1.035+act.decay*.035+bass*.018;
 scene.filter=`grayscale(${.25+act.decay*.22}) sepia(${.34+act.decay*.13}) contrast(${.76+mids*.17}) brightness(${.58+energy*.13}) saturate(${.64-act.decay*.15})`;
 let ok=drawVideoCover(scene,v,w,h,1,gx,gy,zoom);

 if(act.decay>.22&&Math.random()<.18+act.decay*.22){
  scene.globalCompositeOperation='screen';
  drawVideoCover(scene,v2,w,h,.07+act.decay*.13,-gx*2+rand(-8,8),-gy*2+rand(-6,6),1.05+act.decay*.05);
  scene.globalCompositeOperation='source-over';
 }
 scene.filter='none';
 if(!ok){scene.fillStyle='#1b140d';scene.fillRect(0,0,w,h);}

 scene.fillStyle=`rgba(226,209,170,${.08+act.decay*.14})`; scene.fillRect(0,0,w,h);
 if(hardFlash>0){scene.fillStyle=`rgba(255,244,215,${hardFlash})`;scene.fillRect(0,0,w,h);hardFlash*=.74;}
}

/* Frame-rate scratches: short-lived gestures, not an overlay */
function spawnScratch(w,h,act,highs,big=false){
 const kind=Math.random();
 scratches.push({
  kind: big ? (kind<.45?'slash':kind<.75?'arc':'spiral') : (kind<.72?'hair':'slash'),
  x:rand(w*.05,w*.95), y:rand(h*.04,h*.96),
  len:rand(h*.18,h*(big?1.45:.72)),
  r:rand(w*.08,w*(big?.55:.22)),
  angle:rand(-Math.PI,Math.PI),
  drift:rand(-90,90),
  life:big?Math.floor(rand(3,9)):Math.floor(rand(2,5)),
  alpha:big?rand(.18,.52):rand(.08,.30),
  width:big?rand(1.2,4.2):(Math.random()<.86?1:rand(1.2,2.5))
 });
 scratches=scratches.slice(-46);
}
function drawScratches(ctx,w,h,act,highs,bass,beatPulse){
 // Clear previous marks: this prevents the "static overlay" feeling.
 ctx.save();
 const spawnChance=.10+highs*.32+act.damage*.10;
 if(Math.random()<spawnChance) spawnScratch(w,h,act,highs,false);
 if(beatPulse && (highs>.20 || bass>.34) && Math.random()<.28+act.damage*.28) spawnScratch(w,h,act,highs,true);
 if(Math.random()<.006+act.damage*.012) spawnScratch(w,h,act,highs,true);

 scratches=scratches.filter(s=>s.life-- > 0);
 for(const s of scratches){
  ctx.save();
  ctx.translate(s.x,s.y); ctx.rotate(s.angle+Math.sin(frame*.17)*.025);
  ctx.strokeStyle=`rgba(255,247,222,${s.alpha*(s.life+1)/9})`;
  ctx.lineWidth=s.width; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath();
  if(s.kind==='hair'){
   ctx.moveTo(0,-s.len*.5);
   ctx.bezierCurveTo(s.drift*.25,-s.len*.2,-s.drift*.18,s.len*.2,s.drift*.05,s.len*.5);
  }else if(s.kind==='arc'){
   ctx.arc(0,0,s.r,rand(-.5,.5),rand(2.2,5.9));
  }else if(s.kind==='spiral'){
   for(let i=0;i<32;i++){
    const a=i*.42, rr=s.r*i/32, x=Math.cos(a)*rr, y=Math.sin(a)*rr;
    if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
   }
  }else{
   ctx.moveTo(-s.len*.55,rand(-40,40));
   ctx.bezierCurveTo(-s.len*.25,-s.len*.18,s.len*.12,s.len*.18,s.len*.55,rand(-40,40));
  }
  ctx.stroke();
  ctx.restore();
 }
 ctx.restore();
}

/* Painted symbols: wider library + spooky repetition */
const motifTypes=['cell','ring','ladder','grid','crescent','cross','eye','spiral','teeth','constellation','ribbon','target'];
function spawnSymbol(w,h,act,bass,repeat=false){
 let base = repeat && motifMemory.length ? motifMemory[Math.floor(Math.random()*motifMemory.length)] : null;
 const type = base ? base.type : motifTypes[Math.floor(Math.random()*motifTypes.length)];
 const hue = base ? base.hue : Math.random();
 const ev={
  type,hue,
  x: base ? clamp(base.x+rand(-90,90),w*.08,w*.92) : rand(w*.08,w*.92),
  y: base ? clamp(base.y+rand(-70,70),h*.08,h*.92) : rand(h*.08,h*.92),
  r: rand(28,160)*(1+act.symbols*.8+bass*.55),
  life: Math.floor(rand(22,90)),
  spin: rand(-.035,.035),
  alpha: rand(.035,.14)+act.symbols*.08,
  jitter: rand(.2,1.6)
 };
 symbols.push(ev); symbols=symbols.slice(-55);
 if(!base && Math.random()<.42){motifMemory.push({type,hue,x:ev.x,y:ev.y}); motifMemory=motifMemory.slice(-8);}
}
function symbolColor(p,a){
 const red=115+p.hue*125, green=36+(1-p.hue)*85, blue=20+Math.sin(p.hue*Math.PI)*55;
 return `rgba(${red},${green},${blue},${a})`;
}
function drawOneSymbol(ctx,p,bass,mids){
 ctx.save();
 ctx.translate(p.x+rand(-p.jitter,p.jitter),p.y+rand(-p.jitter,p.jitter));
 ctx.rotate(frame*p.spin);
 const f=clamp(p.life/90,0,1), r=p.r*(.75+bass*.35), a=p.alpha*f*(1+mids*.8);
 ctx.strokeStyle=symbolColor(p,a*1.8); ctx.fillStyle=symbolColor(p,a*.55);
 ctx.lineWidth=2+bass*9; ctx.lineCap='round'; ctx.lineJoin='round';
 ctx.beginPath();
 if(p.type==='cell'){
  for(let i=0;i<10;i++){const ang=i/10*Math.PI*2, rr=r*(.72+Math.sin(i*2.1+frame*.07)*.12);const x=Math.cos(ang)*rr,y=Math.sin(ang)*rr*.68;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}ctx.closePath();ctx.fill();ctx.stroke();
 }else if(p.type==='ring'){
  ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(0,0,r*.45,0,Math.PI*2);ctx.stroke();
 }else if(p.type==='ladder'){
  for(let i=-3;i<=3;i++){ctx.moveTo(-r*.55,i*r*.14);ctx.lineTo(r*.55,i*r*.14);}ctx.moveTo(-r*.6,-r*.5);ctx.lineTo(-r*.6,r*.5);ctx.moveTo(r*.6,-r*.5);ctx.lineTo(r*.6,r*.5);ctx.stroke();
 }else if(p.type==='grid'){
  for(let i=-3;i<=3;i++){ctx.moveTo(-r,i*r*.22);ctx.lineTo(r,i*r*.22);ctx.moveTo(i*r*.22,-r);ctx.lineTo(i*r*.22,r);}ctx.stroke();
 }else if(p.type==='crescent'){
  ctx.arc(0,0,r,-1.3,1.7);ctx.stroke();ctx.beginPath();ctx.arc(r*.32,0,r*.82,-1.4,1.6);ctx.stroke();
 }else if(p.type==='cross'){
  ctx.moveTo(-r,0);ctx.lineTo(r,0);ctx.moveTo(0,-r);ctx.lineTo(0,r);ctx.moveTo(-r*.6,-r*.6);ctx.lineTo(r*.6,r*.6);ctx.stroke();
 }else if(p.type==='eye'){
  ctx.moveTo(-r,0);ctx.bezierCurveTo(-r*.4,-r*.5,r*.4,-r*.5,r,0);ctx.bezierCurveTo(r*.4,r*.5,-r*.4,r*.5,-r,0);ctx.stroke();ctx.beginPath();ctx.arc(0,0,r*.18,0,Math.PI*2);ctx.fill();
 }else if(p.type==='spiral'){
  for(let i=0;i<42;i++){const aa=i*.38,rr=r*i/42,x=Math.cos(aa)*rr,y=Math.sin(aa)*rr;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}ctx.stroke();
 }else if(p.type==='teeth'){
  for(let i=0;i<9;i++){const x=-r+i*r*.25;ctx.moveTo(x,0);ctx.lineTo(x+r*.12,Math.sin(i+frame*.06)*r*.42);ctx.lineTo(x+r*.24,0);}ctx.stroke();
 }else if(p.type==='constellation'){
  let pts=[];for(let i=0;i<7;i++)pts.push([rand(-r,r),rand(-r,r)]);for(let i=0;i<pts.length-1;i++){ctx.moveTo(pts[i][0],pts[i][1]);ctx.lineTo(pts[i+1][0],pts[i+1][1]);}ctx.stroke();for(const q of pts){ctx.beginPath();ctx.arc(q[0],q[1],3+bass*5,0,Math.PI*2);ctx.fill();}
 }else if(p.type==='ribbon'){
  ctx.moveTo(-r,-r*.2);ctx.bezierCurveTo(-r*.2,-r*.8,r*.2,r*.8,r,r*.2);ctx.bezierCurveTo(r*.2,-r*.4,-r*.2,r*.4,-r,-r*.2);ctx.fill();ctx.stroke();
 }else{
  for(let k=1;k<=4;k++){ctx.beginPath();ctx.arc(0,0,r*k/4,0,Math.PI*2);ctx.stroke();}
 }
 ctx.restore();
}
function drawSymbols(ctx,w,h,act,bass,mids,beatPulse,barPulse){
 // Gentle persistence, not full clear. Symbols smear and repeat.
 ctx.fillStyle=`rgba(0,0,0,${.055+act.decay*.035})`; ctx.fillRect(0,0,w,h);

 if(beatPulse && Math.random()<act.symbols*(.18+mids*.55)) spawnSymbol(w,h,act,bass,false);
 if(barPulse && Math.random()<act.symbols*.72) spawnSymbol(w,h,act,bass,Math.random()<.62);
 if(Math.random()<.004+act.symbols*.012) spawnSymbol(w,h,act,bass,true);

 symbols=symbols.filter(p=>p.life-- > 0);
 for(const p of symbols) drawOneSymbol(ctx,p,bass,mids);
}

function addBurn(w,h,bass,act){burns.push({x:rand(w*.1,w*.9),y:rand(h*.1,h*.9),r:rand(90,260)*(1+bass+act.decay),life:rand(24,60)});burns=burns.slice(-9);}
function drawBurns(ctx,w,h,bass,mids,act){
 if(Math.random()<.003+bass*.020+act.decay*.008)addBurn(w,h,bass,act);
 burns=burns.filter(b=>b.life-- > 0);
 for(const b of burns){const f=clamp(b.life/60,0,1),r=b.r*(1.25-f*.25),g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,r);g.addColorStop(0,`rgba(255,250,222,${(.16+bass*.25)*f})`);g.addColorStop(.25,`rgba(238,118,43,${(.09+mids*.13)*f})`);g.addColorStop(.65,`rgba(80,22,9,${(.10+act.decay*.14)*f})`);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(b.x,b.y,r,0,Math.PI*2);ctx.fill();}
}

function drawDamage(ctx,w,h,act,bass,mids,highs,beatPulse){
 // Event layer clears almost fully to avoid static scratch overlay.
 ctx.clearRect(0,0,w,h);
 drawBurns(ctx,w,h,bass,mids,act);
 drawScratches(ctx,w,h,act,highs,bass,beatPulse);

 // Sparse waveform etching.
 if(timeData && Math.random()<.45+act.damage*.18){
  const rows=1+Math.floor(mids*4);
  ctx.strokeStyle=`rgba(255,232,188,${.025+highs*.12})`;ctx.lineWidth=1;
  for(let r=0;r<rows;r++){
   const yBase=h*((r+1)/(rows+1));ctx.beginPath();
   for(let x=0;x<w;x+=9){const idx=Math.floor((x/w)*timeData.length),v=(timeData[idx]-128)/128,y=yBase+v*(14+mids*70)+Math.sin(x*.018+frame*.03+r)*9;if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
   ctx.stroke();
  }
 }

 // Occasional splice flash / black tear.
 if(Math.random()<bass*.035+act.decay*.006){ctx.fillStyle=`rgba(255,243,214,${.05+bass*.20})`;ctx.fillRect(0,0,w,h);}
 if(Math.random()<act.decay*.020){ctx.fillStyle=`rgba(0,0,0,${rand(.08,.26)})`;ctx.fillRect(0,rand(0,h),w,rand(8,48));}
}

function drawDirt(ctx,w,h,bass,highs){
 ctx.clearRect(0,0,w,h);
 ctx.fillStyle='rgba(0,0,0,.30)';ctx.fillRect(0,0,22,h);ctx.fillRect(w-22,0,22,h);
 ctx.fillStyle=`rgba(0,0,0,${.25+bass*.08})`;for(let y=-20;y<h+40;y+=42){ctx.fillRect(9+Math.sin(frame*.03+y)*2,y,13,19);ctx.fillRect(w-22+Math.sin(frame*.03+y)*2,y+8,13,19);}
 const n=70+Math.floor(highs*75);
 for(let i=0;i<n;i++){ctx.fillStyle=`rgba(0,0,0,${rand(.010,.045)})`;ctx.beginPath();ctx.arc(rand(0,w),rand(0,h),rand(.3,1.8),0,Math.PI*2);ctx.fill();}
}

function render(){
 requestAnimationFrame(render); const w=wrap.clientWidth,h=wrap.clientHeight;
 if(!isPlaying||!analyser){scene.fillStyle='#15100a';scene.fillRect(0,0,w,h);return;}
 frame++;
 analyser.getByteFrequencyData(freqData); analyser.getByteTimeDomainData(timeData);
 const t=audio.currentTime,act=getAct(t);
 const bass=clamp(bandAverage(35,165)*1.45,0,1),mids=clamp(bandAverage(520,2600)*1.2,0,1),highs=clamp(bandAverage(2600,9000)*1.55,0,1),energy=clamp(rms()*2.7,0,1);
 const beat=Math.floor((t*BPM)/60),bar=Math.floor(beat/BEATS_PER_BAR),beatPulse=beat!==lastBeat,barPulse=bar!==lastBar;

 if(beatPulse){
  lastBeat=beat;
  if(bass>.30||act.damage>.42){gateX=rand(-9,9)*(bass+act.damage);gateY=rand(-6,6)*(bass+act.damage);}
  if(bass>.46&&Math.random()<.22+act.loops*.30)stutterFrames=Math.floor(rand(3,10));
 }
 if(barPulse){
  lastBar=bar;
  if(Math.random()<.18+act.loops*.50){const v=videos[currentVideo]; if(v&&v.duration){loopTime=v.currentTime;loopMode=Math.floor(rand(12,34));}}
  if(Math.random()<.14+act.decay*.25)addBurn(w,h,bass,act);
 }
 if(t>nextCutAt){chooseNewVideo(); nextCutAt=t+rand(act.cuts*.55,act.cuts*1.3);}

 gateX*=.82;gateY*=.82;
 drawScene(w,h,t,act,bass,mids,energy);
 drawSymbols(sym,w,h,act,bass,mids,beatPulse,barPulse);
 drawDamage(damage,w,h,act,bass,mids,highs,beatPulse);
 drawDirt(dirt,w,h,bass,highs);

 if(t>285){const end=clamp((t-285)/39,0,1);scene.fillStyle=`rgba(238,229,199,${end*.13})`;scene.fillRect(0,0,w,h);sym.fillStyle=`rgba(255,248,226,${end*.030})`;sym.fillRect(0,0,w,h);}
 if(t>321.5){const end=clamp((t-321.5)/2.5,0,1);damage.fillStyle=`rgba(255,248,230,${(1-end)*.24})`;damage.fillRect(0,0,w,h);scene.fillStyle=`rgba(0,0,0,${end})`;scene.fillRect(0,0,w,h);}
}

async function start(){
 if(!videos.length)makeVideos(); if(!audioCtx)setupAudio(); if(audioCtx.state==='suspended')await audioCtx.resume();
 await startVideos(); await audio.play(); isPlaying=true; starter.style.display='none'; btnPlay.textContent='⏸'; nextCutAt=0;
}
startBtn.onclick=start; starter.onclick=e=>e.target===starter&&start();
btnPlay.onclick=async()=>{if(audio.paused)await start();else{audio.pause();for(const v of videos)v.pause();isPlaying=false;btnPlay.textContent='▶';}};
audio.addEventListener('ended',()=>{isPlaying=false;btnPlay.textContent='▶';});
audio.addEventListener('loadedmetadata',()=>{tDur.textContent=fmt(audio.duration||TRACK_SECONDS);});
audio.ontimeupdate=()=>{const dur=audio.duration||TRACK_SECONDS;tTime.textContent=fmt(audio.currentTime);tDur.textContent=fmt(dur);if(dur)rSeek.value=audio.currentTime/dur;};
rSeek.oninput=e=>{const dur=audio.duration||TRACK_SECONDS;if(dur)audio.currentTime=Number(e.target.value)*dur;};
rVol.oninput=e=>{const v=Number(e.target.value);audio.volume=v;if(gainNode)gainNode.gain.value=v;};
render();
</script>
