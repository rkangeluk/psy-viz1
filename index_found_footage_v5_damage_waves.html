<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>One — Found Footage v5 Damage Waves</title>
<style>
html,body{margin:0;height:100%;background:#050403;overflow:hidden;font:400 12px/22px Arial,sans-serif;color:#332e27}
#wrap{position:relative;width:100%;height:100vh;overflow:hidden;background:#030201}
canvas{position:absolute;inset:0;width:100%;height:100%}
#scene{z-index:1}
#damage{z-index:2;mix-blend-mode:screen;opacity:.98}
#dirt{z-index:3;mix-blend-mode:multiply;opacity:.72}
#vignette{position:absolute;inset:-5%;z-index:4;pointer-events:none;background:radial-gradient(ellipse at center,rgba(255,241,202,.05) 0%,rgba(0,0,0,0) 42%,rgba(0,0,0,.78) 100%),linear-gradient(90deg,rgba(0,0,0,.52),transparent 13%,transparent 87%,rgba(0,0,0,.52))}
#frame{position:absolute;inset:0;z-index:5;pointer-events:none;box-shadow:inset 0 0 0 1px rgba(255,241,203,.05),inset 0 0 80px rgba(0,0,0,.88)}
.ui{position:absolute;left:0;right:0;bottom:0;z-index:20;display:flex;align-items:center;gap:.75rem;padding:.6rem .8rem;background:rgba(239,232,213,.88);opacity:0;transform:translateY(8px);transition:.25s ease;pointer-events:none}
#wrap:hover .ui{opacity:1;transform:none;pointer-events:auto}
.btn{all:unset;cursor:pointer;width:36px;height:36px;border-radius:9999px;text-align:center;background:rgba(0,0,0,.06)}
.label{min-width:52px;text-align:right;opacity:.85}.grow{flex:1}.spacer{width:8px}
input[type=range]{appearance:none;height:4px;width:240px;background:rgba(0,0,0,.18);border-radius:999px}
input[type=range]::-webkit-slider-thumb{appearance:none;width:14px;height:14px;border-radius:50%;background:#3e3a33}
.starter{position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;background:radial-gradient(circle at center,rgba(255,239,196,.08),rgba(0,0,0,.78)),linear-gradient(180deg,rgba(0,0,0,.20),rgba(0,0,0,.72))}
.title{font-size:clamp(28px,4vw,50px);color:#efe4cd;letter-spacing:.13em;text-transform:uppercase;text-shadow:0 2px 20px rgba(0,0,0,.95)}
.subtitle{color:rgba(239,228,205,.72);letter-spacing:.08em;text-transform:uppercase;margin-top:-18px}
.play-oval{all:unset;cursor:pointer;display:flex;align-items:center;justify-content:center;width:140px;height:50px;border-radius:9999px;background:rgba(220,207,163,.72);border:2px solid rgba(105,92,55,.9);box-shadow:0 6px 24px rgba(0,0,0,.5)}
.play-oval svg{width:20px;height:20px;fill:#4a4021}
.hiddenVideo{position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;pointer-events:none}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="scene"></canvas>
  <canvas id="damage"></canvas>
  <canvas id="dirt"></canvas>
  <div id="vignette"></div><div id="frame"></div>

  <div class="ui">
    <button id="play" class="btn">▶</button><span id="time" class="label">0:00</span>
    <input id="seek" type="range" min="0" max="1" step="0.001" value="0" class="grow">
    <span id="dur" class="label">5:24</span><div class="spacer"></div>
    <input id="vol" type="range" min="0" max="1" step="0.01" value="0.9" style="width:110px">
  </div>

  <div id="starter" class="starter">
    <div class="title">One</div>
    <div class="subtitle">damage waves v5</div>
    <button id="startBtn" class="play-oval" aria-label="Play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
  </div>

  <audio id="audio" preload="auto" crossorigin="anonymous"><source src="one.mp3" type="audio/mpeg"></audio>
</div>

<script>
const BPM=140, TRACK_SECONDS=324, BEATS_PER_BAR=4;
const CLIPS={
  mayor:"https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/mayor.mp4",
  hatman:"https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/hatman.mp4",
  fete1:"https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/fete1.mp4",
  poolparty:"https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/poolparty.mp4",
  swimming:"https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/swimming.mp4",
  dance:"https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/dance.mp4",
  clown:"https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/clown.mp4",
  fete2:"https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/fete2.mp4",
  ny:"https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/NY.mp4"
};

const SEQUENCES=[
  ["mayor","hatman","fete1"],
  ["poolparty","swimming","dance"],
  ["clown","fete2","ny"],
  ["hatman","mayor","clown","fete2"],
  ["swimming","poolparty","dance"]
];

const ACTS=[
  {start:0,end:70,decay:.10,cutMin:1.8,cutMax:2.9,repeats:2},
  {start:70,end:150,decay:.24,cutMin:1.6,cutMax:2.7,repeats:2},
  {start:150,end:240,decay:.42,cutMin:1.4,cutMax:2.4,repeats:3},
  {start:240,end:324,decay:.64,cutMin:1.2,cutMax:2.1,repeats:3}
];

const wrap=document.getElementById('wrap');
const sceneCanvas=document.getElementById('scene'), damageCanvas=document.getElementById('damage'), dirtCanvas=document.getElementById('dirt');
const s=sceneCanvas.getContext('2d',{alpha:false}), d=damageCanvas.getContext('2d',{alpha:true}), di=dirtCanvas.getContext('2d',{alpha:true});
const audio=document.getElementById('audio'), starter=document.getElementById('starter'), startBtn=document.getElementById('startBtn'), btnPlay=document.getElementById('play');
const rSeek=document.getElementById('seek'), rVol=document.getElementById('vol'), tTime=document.getElementById('time'), tDur=document.getElementById('dur');

let audioCtx,src,gain,analyser,freqData,timeData;
let vids={},isPlaying=false,frame=0,lastBeat=-1,lastBar=-1;
let seq=0,rep=0,clip=0,nextChange=0,gateX=0,gateY=0,hardFlash=0,loopFrames=0,loopTime=0,tearFlash=0;
let scratchMode='worn',modeUntil=0,burns=[];

const pad=x=>(x<10?'0':'')+x;
const fmt=t=>(!isFinite(t)?'0:00':((t/60)|0)+':'+pad((t%60)|0));
const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function getAct(t){return ACTS.find(a=>t>=a.start&&t<a.end)||ACTS[ACTS.length-1];}

function resize(){
 const r=wrap.getBoundingClientRect(),dpr=Math.min(devicePixelRatio||1,2);
 [sceneCanvas,damageCanvas,dirtCanvas].forEach(c=>{c.width=Math.floor(r.width*dpr);c.height=Math.floor(r.height*dpr);c.style.width=r.width+'px';c.style.height=r.height+'px';});
 [s,d,di].forEach(cx=>cx.setTransform(dpr,0,0,dpr,0,0));
}
addEventListener('resize',resize,{passive:true}); resize();

function makeVideos(){
 for(const [k,u] of Object.entries(CLIPS)){
  const v=document.createElement('video');
  v.className='hiddenVideo'; v.src=u; v.crossOrigin='anonymous'; v.loop=true; v.muted=true; v.playsInline=true; v.preload='auto';
  v.playbackRate=.50+Math.random()*.35;
  document.body.appendChild(v); vids[k]=v;
 }
}
async function startVideos(){for(const v of Object.values(vids)){try{await v.play();}catch(e){console.warn('video issue',v.src,e);}}}
function currentVid(){return vids[SEQUENCES[seq][clip]];}
function advanceClip(){
 const act=getAct(audio.currentTime);
 clip++;
 if(clip>=SEQUENCES[seq].length){
  clip=0; rep++;
  if(rep>=act.repeats){rep=0; seq=(seq+1)%SEQUENCES.length;}
 }
 const v=currentVid();
 if(v && v.duration && isFinite(v.duration)){
  try{v.currentTime=rand(0,Math.max(.25,v.duration-1.4));}catch(e){}
  v.playbackRate=.45+Math.random()*.45;
 }
 nextChange=audio.currentTime+rand(act.cutMin,act.cutMax);
 hardFlash=.08+Math.random()*.08;
 if(Math.random()<.28+act.decay*.22){loopFrames=Math.floor(rand(8,22)); if(v)loopTime=v.currentTime;}
}

function setupAudio(){
 const AC=AudioContext||webkitAudioContext; audioCtx=new AC();
 src=audioCtx.createMediaElementSource(audio); gain=audioCtx.createGain(); gain.gain.value=Number(rVol.value);
 analyser=audioCtx.createAnalyser(); analyser.fftSize=2048; analyser.smoothingTimeConstant=.68;
 freqData=new Uint8Array(analyser.frequencyBinCount); timeData=new Uint8Array(analyser.fftSize);
 src.connect(gain); gain.connect(analyser); gain.connect(audioCtx.destination);
}
function band(a,b){
 if(!freqData||!audioCtx)return 0;
 const ny=audioCtx.sampleRate/2, sidx=Math.floor(a/ny*freqData.length), eidx=Math.floor(b/ny*freqData.length);
 let sum=0,n=0; for(let i=sidx;i<=eidx&&i<freqData.length;i++){sum+=freqData[i];n++;}
 return n?sum/(n*255):0;
}
function rms(){
 if(!timeData)return 0; let sum=0; for(let i=0;i<timeData.length;i++){const v=(timeData[i]-128)/128;sum+=v*v;} return Math.sqrt(sum/timeData.length);
}
function drawCover(ctx,v,w,h,alpha=1,dx=0,dy=0,zoom=1){
 if(!v||v.readyState<2)return false;
 const scale=Math.max(w/v.videoWidth,h/v.videoHeight)*zoom, dw=v.videoWidth*scale, dh=v.videoHeight*scale;
 ctx.save(); ctx.globalAlpha=alpha; ctx.drawImage(v,(w-dw)/2+dx,(h-dh)/2+dy,dw,dh); ctx.restore(); return true;
}

function updateMode(t,bass,highs,act,barPulse){
 if(t>modeUntil || barPulse && Math.random()<.35){
  const r=Math.random();
  if(r<.48-act.decay*.2) scratchMode='worn';
  else if(r<.82-act.decay*.1) scratchMode='damaged';
  else scratchMode='vandalised';
  modeUntil=t+rand(2.5,7.5);
 }
 if(bass>.62||highs>.68){scratchMode='vandalised'; modeUntil=t+rand(.7,2.2);}
}

function scratchFrame(w,h,intensity,highs,bass){
 // scratches are generated per-frame/per-few-frames, then cleared next frame
 let n;
 if(scratchMode==='worn') n=Math.floor(rand(0,3)+highs*3);
 else if(scratchMode==='damaged') n=Math.floor(rand(2,8)+highs*10);
 else n=Math.floor(rand(7,22)+highs*26+bass*12);

 for(let i=0;i<n;i++){
  const huge=scratchMode==='vandalised' && Math.random()<.38;
  const x=rand(-w*.1,w*1.1), y=rand(-h*.1,h*1.1);
  const len=huge?rand(w*.55,w*1.45):rand(h*.18,h*.85);
  const a=huge?rand(.30,.85):rand(.13,.48);
  d.strokeStyle=`rgba(255,248,226,${a*intensity})`;
  d.lineWidth=huge?rand(2,8):rand(.8,3.2);
  d.lineCap='round';
  d.beginPath();
  if(huge && Math.random()<.45){
    // giant razor slash
    const ang=rand(-.9,.9);
    d.moveTo(x,y);
    d.lineTo(x+Math.cos(ang)*len,y+Math.sin(ang)*len);
  }else if(huge && Math.random()<.55){
    // scratched arc
    const r=rand(w*.15,w*.55);
    d.arc(rand(w*.15,w*.85),rand(h*.15,h*.85),r,rand(0,Math.PI),rand(Math.PI,Math.PI*2.7));
  }else{
    // hairline / emulsion scratch
    d.moveTo(x,y);
    d.bezierCurveTo(x+rand(-120,120),y+len*.33,x+rand(-120,120),y+len*.66,x+rand(-70,70),y+len);
  }
  d.stroke();
 }

 // occasional clusters of parallel claw marks
 if(scratchMode==='vandalised' && Math.random()<.12+bass*.16){
  const x=rand(w*.1,w*.9), y=rand(h*.1,h*.9), ang=rand(-1.2,1.2), count=Math.floor(rand(3,8));
  d.strokeStyle=`rgba(255,248,226,${rand(.35,.82)})`; d.lineWidth=rand(1.5,4);
  for(let k=0;k<count;k++){
    const off=(k-count/2)*rand(7,18), l=rand(w*.25,w*.75);
    d.beginPath(); d.moveTo(x+off,y-off*.3); d.lineTo(x+Math.cos(ang)*l+off,y+Math.sin(ang)*l-off*.3); d.stroke();
  }
 }
}

function drawBurns(w,h,bass,act){
 if(Math.random()<.002+bass*.018+act.decay*.010) burns.push({x:rand(w*.1,w*.9),y:rand(h*.1,h*.9),r:rand(90,260)*(1+bass+act.decay),life:rand(18,58)});
 burns=burns.filter(b=>b.life-- > 0).slice(-8);
 for(const b of burns){
  const f=clamp(b.life/58,0,1), r=b.r*(1.18-f*.18);
  const g=d.createRadialGradient(b.x,b.y,0,b.x,b.y,r);
  g.addColorStop(0,`rgba(255,250,222,${(.15+bass*.24)*f})`);
  g.addColorStop(.25,`rgba(235,112,38,${(.08+bass*.10)*f})`);
  g.addColorStop(.68,`rgba(65,18,7,${(.10+act.decay*.12)*f})`);
  g.addColorStop(1,'rgba(0,0,0,0)');
  d.fillStyle=g; d.beginPath(); d.arc(b.x,b.y,r,0,Math.PI*2); d.fill();
 }
}

function drawDirt(w,h,bass,highs,act){
 di.clearRect(0,0,w,h);
 di.fillStyle='rgba(0,0,0,.30)'; di.fillRect(0,0,22,h); di.fillRect(w-22,0,22,h);
 di.fillStyle=`rgba(0,0,0,${.22+bass*.10})`;
 for(let y=-20;y<h+40;y+=42){di.fillRect(9+Math.sin(frame*.03+y)*2,y,13,19);di.fillRect(w-22+Math.sin(frame*.03+y)*2,y+8,13,19);}
 const dust=55+Math.floor(highs*85+act.decay*40);
 for(let i=0;i<dust;i++){
  const dark=Math.random()<.65;
  di.fillStyle=dark?`rgba(0,0,0,${rand(.012,.050)})`:`rgba(255,245,220,${rand(.010,.040)})`;
  di.beginPath(); di.arc(rand(0,w),rand(0,h),Math.random()<.9?rand(.3,1.6):rand(2,5),0,Math.PI*2); di.fill();
 }
}

function render(){
 requestAnimationFrame(render);
 const w=wrap.clientWidth,h=wrap.clientHeight;
 if(!isPlaying||!analyser){s.fillStyle='#15100a';s.fillRect(0,0,w,h);return;}
 frame++;
 analyser.getByteFrequencyData(freqData); analyser.getByteTimeDomainData(timeData);
 const t=audio.currentTime, act=getAct(t), bass=clamp(band(35,165)*1.45,0,1), highs=clamp(band(2600,9000)*1.55,0,1), mids=clamp(band(520,2600)*1.2,0,1), energy=clamp(rms()*2.7,0,1);
 const beat=Math.floor(t*BPM/60), bar=Math.floor(beat/BEATS_PER_BAR), beatPulse=beat!==lastBeat, barPulse=bar!==lastBar;
 if(beatPulse){lastBeat=beat;if(bass>.28||scratchMode==='vandalised'){gateX=rand(-8,8)*(bass+act.decay);gateY=rand(-5,5)*(bass+act.decay);}if(bass>.55)tearFlash=.18;}
 if(barPulse){lastBar=bar;if(Math.random()<.22+act.decay*.28)burns.push({x:rand(w*.1,w*.9),y:rand(h*.1,h*.9),r:rand(120,360)*(1+bass),life:rand(20,52)});}
 if(t>nextChange) advanceClip();
 updateMode(t,bass,highs,act,barPulse);

 const v=currentVid();
 if(loopFrames>0 && v && v.duration){loopFrames--; try{v.currentTime=loopTime+Math.sin(loopFrames*.9)*.09;}catch(e){}}

 s.fillStyle=`rgba(5,3,1,${.05+act.decay*.026})`; s.fillRect(0,0,w,h);
 s.filter=`sepia(${.32+act.decay*.12}) grayscale(${.22+act.decay*.20}) contrast(${.78+mids*.12}) brightness(${.56+energy*.12}) saturate(${.68-act.decay*.18})`;
 drawCover(s,v,w,h,1,gateX+rand(-.4,.4),gateY+rand(-.4,.4),1.035+act.decay*.035);
 if(act.decay>.25 && Math.random()<.12+act.decay*.20){
   const names=SEQUENCES[(seq+1)%SEQUENCES.length], v2=vids[names[Math.floor(Math.random()*names.length)]];
   s.globalCompositeOperation='screen'; drawCover(s,v2,w,h,.08+act.decay*.12,-gateX*1.5+rand(-8,8),-gateY*1.5+rand(-6,6),1.06); s.globalCompositeOperation='source-over';
 }
 s.filter='none';
 s.fillStyle=`rgba(226,209,170,${.07+act.decay*.13+Math.random()*.025})`; s.fillRect(0,0,w,h);
 if(hardFlash>0){s.fillStyle=`rgba(255,244,215,${hardFlash})`;s.fillRect(0,0,w,h);hardFlash*=.74;}
 gateX*=.82; gateY*=.82;

 d.clearRect(0,0,w,h);
 drawBurns(w,h,bass,act);
 scratchFrame(w,h,1,highs,bass);

 // flicker / projector flash / vandalised blackout strips
 if(Math.random()<.035+bass*.030+act.decay*.012){d.fillStyle=`rgba(255,243,214,${.045+bass*.18})`;d.fillRect(0,0,w,h);}
 if(tearFlash>0){d.fillStyle=`rgba(0,0,0,${tearFlash})`;d.fillRect(0,rand(0,h),w,rand(20,90));tearFlash*=.65;}
 if(scratchMode==='vandalised' && Math.random()<.05){d.fillStyle=`rgba(255,248,226,${rand(.10,.28)})`;d.fillRect(rand(0,w),0,rand(2,10),h);}

 drawDirt(w,h,bass,highs,act);

 if(t>285){const end=clamp((t-285)/39,0,1);s.fillStyle=`rgba(238,229,199,${end*.12})`;s.fillRect(0,0,w,h);}
 if(t>321.5){const end=clamp((t-321.5)/2.5,0,1);s.fillStyle=`rgba(0,0,0,${end})`;s.fillRect(0,0,w,h);}
}

async function start(){
 if(!Object.keys(vids).length)makeVideos();
 if(!audioCtx)setupAudio();
 if(audioCtx.state==='suspended')await audioCtx.resume();
 await startVideos(); await audio.play();
 isPlaying=true; starter.style.display='none'; btnPlay.textContent='⏸'; if(!nextChange)advanceClip();
}
startBtn.onclick=start; starter.onclick=e=>e.target===starter&&start();
btnPlay.onclick=async()=>{if(audio.paused)await start();else{audio.pause();Object.values(vids).forEach(v=>v.pause());isPlaying=false;btnPlay.textContent='▶';}};
audio.addEventListener('ended',()=>{isPlaying=false;btnPlay.textContent='▶';});
audio.addEventListener('loadedmetadata',()=>{tDur.textContent=fmt(audio.duration||TRACK_SECONDS);});
audio.ontimeupdate=()=>{const dur=audio.duration||TRACK_SECONDS;tTime.textContent=fmt(audio.currentTime);tDur.textContent=fmt(dur);if(dur)rSeek.value=audio.currentTime/dur;};
rSeek.oninput=e=>{const dur=audio.duration||TRACK_SECONDS;if(dur)audio.currentTime=Number(e.target.value)*dur;};
rVol.oninput=e=>{const v=Number(e.target.value);audio.volume=v;if(gain)gain.gain.value=v;};
render();
</script>
</body>
</html>
