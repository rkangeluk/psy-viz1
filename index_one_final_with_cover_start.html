<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Visualizer – One (140 BPM)</title>
<style>
html,body{margin:0;height:100%;background:#050403;overflow:hidden;font:400 12px/22px Arial,sans-serif;color:#332e27}
#wrap{position:relative;width:100%;height:100vh;overflow:hidden;background:#030201}
canvas{position:absolute;inset:0;width:100%;height:100%}
#scene{z-index:1}
#colour{z-index:2;mix-blend-mode:multiply;opacity:.78}
#damage{z-index:3;mix-blend-mode:screen;opacity:.98}
#dirt{z-index:4;mix-blend-mode:multiply;opacity:.70}
#vignette{position:absolute;inset:-5%;z-index:5;pointer-events:none;background:radial-gradient(ellipse at center,rgba(255,241,202,.05) 0%,rgba(0,0,0,0) 42%,rgba(0,0,0,.80) 100%),linear-gradient(90deg,rgba(0,0,0,.52),transparent 13%,transparent 87%,rgba(0,0,0,.52))}
#frame{position:absolute;inset:0;z-index:6;pointer-events:none;box-shadow:inset 0 0 0 1px rgba(255,241,203,.05),inset 0 0 90px rgba(0,0,0,.9)}
.ui{position:absolute;left:0;right:0;bottom:0;z-index:20;display:flex;align-items:center;gap:.75rem;padding:.6rem .8rem;background:rgba(239,232,213,.88);opacity:0;transform:translateY(8px);transition:.25s ease;pointer-events:none}
#wrap:hover .ui{opacity:1;transform:none;pointer-events:auto}
.btn{all:unset;cursor:pointer;width:36px;height:36px;border-radius:9999px;text-align:center;background:rgba(0,0,0,.06)}
.label{min-width:52px;text-align:right;opacity:.85}.grow{flex:1}.spacer{width:8px}
input[type=range]{appearance:none;height:4px;width:240px;background:rgba(0,0,0,.18);border-radius:999px}
input[type=range]::-webkit-slider-thumb{appearance:none;width:14px;height:14px;border-radius:50%;background:#3e3a33}
.starter{
  position:absolute;
  inset:0;
  z-index:30;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:32px;
  background:
    linear-gradient(180deg,rgba(0,0,0,.35),rgba(0,0,0,.55)),
    url('https://rkangeluk.github.io/psy-viz1/covers/psy_cover.jpeg')
      center/cover no-repeat;
}
.track-title{
  font-size:clamp(26px,3.4vw,36px);
  color:#fff;
  text-shadow:0 2px 12px rgba(0,0,0,.9);
}
.play-oval{all:unset;cursor:pointer;display:flex;align-items:center;justify-content:center;width:140px;height:50px;border-radius:9999px;background:rgba(220,207,163,.72);border:2px solid rgba(105,92,55,.9);box-shadow:0 6px 24px rgba(0,0,0,.5)}
.play-oval svg{width:20px;height:20px;fill:#4a4021}
.hiddenVideo{position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;pointer-events:none}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="scene"></canvas>
  <canvas id="colour"></canvas>
  <canvas id="damage"></canvas>
  <canvas id="dirt"></canvas>
  <div id="vignette"></div><div id="frame"></div>
  <div class="ui">
    <button id="play" class="btn">▶</button><span id="time" class="label">0:00</span>
    <input id="seek" type="range" min="0" max="1" step="0.001" value="0" class="grow">
    <span id="dur" class="label">5:24</span><div class="spacer"></div>
    <input id="vol" type="range" min="0" max="1" step="0.01" value="0.9" style="width:110px">
  </div>
  <div id="starter" class="starter">
    <div class="track-title">One</div>
    <button id="startBtn" class="play-oval" aria-label="Play">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
  </div>
  <audio id="audio" preload="auto" crossorigin="anonymous"><source src="one.mp3" type="audio/mpeg"></audio>
</div>

<script>
const BPM=140, TRACK_SECONDS=324, BEATS_PER_BAR=4;
const CLIPS={
  mayor:"https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/mayor.mp4",
  hatman:"https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/hatman.mp4",
  fete1:"https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/fete1.mp4",
  poolparty:"https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/poolparty.mp4",
  swimming:"https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/swimming.mp4",
  dance:"https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/dance.mp4",
  clown:"https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/clown.mp4",
  fete2:"https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/fete2.mp4",
  ny:"https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/NY.mp4"
};
const SEQUENCES=[
  ["mayor","hatman","fete1"],
  ["poolparty","swimming","dance"],
  ["clown","fete2","ny"],
  ["hatman","mayor","clown","fete2"],
  ["swimming","poolparty","dance"],
  ["fete1","mayor","fete2"]
];
const TIMELINE=[
  {at:0,   name:"opening",    wash:null,              washA:0,   bleach:.05, flicker:.20, damage:.22, scratch:.46, cutMin:1.9, cutMax:3.0, repeats:2, slow:.62, openingRamp:true},
  {at:52.85,name:"bleach",     wash:null,              washA:0,   bleach:.72, flicker:.20, damage:.18, scratch:.10, cutMin:2.4, cutMax:3.4, repeats:2, slow:.35},
  {at:53.85,name:"whiteout",   wash:null,              washA:0,   bleach:1.0, flicker:.08, damage:.05, scratch:.04, cutMin:2.6, cutMax:3.5, repeats:2, slow:.35, white:1.0},
  {at:55,  name:"overlay1",   wash:"rgba(35,120,95,", washA:.24, bleach:.18, flicker:.16, damage:.26, scratch:.20, cutMin:1.8, cutMax:2.8, repeats:2, slow:.55},
  {at:81,  name:"overlay2",   wash:"rgba(140,35,130,",washA:.30, bleach:.12, flicker:.50, damage:.46, scratch:.32, cutMin:1.6, cutMax:2.5, repeats:2, slow:.60},
  {at:136, name:"overlay3",   wash:"rgba(205,88,25,", washA:.34, bleach:.10, flicker:.58, damage:.60, scratch:.44, cutMin:1.4, cutMax:2.4, repeats:2, slow:.62},
  {at:190, name:"breakdown",  wash:null,              washA:0,   bleach:.82, flicker:.18, damage:.28, scratch:.18, cutMin:2.6, cutMax:4.2, repeats:3, slow:.30, white:.50},
  {at:219, name:"drop",       wash:"rgba(25,112,170,",washA:.35, bleach:.08, flicker:.70, damage:.72, scratch:.58, cutMin:1.2, cutMax:2.0, repeats:3, slow:.68},
  {at:287, name:"outro",      wash:"rgba(205,35,35,", washA:.36, bleach:.15, flicker:.62, damage:.82, scratch:.62, cutMin:.55, cutMax:1.35, repeats:3, slow:.70, outro:true, white:.75}
];

const wrap=document.getElementById('wrap');
const sceneCanvas=document.getElementById('scene'), colourCanvas=document.getElementById('colour'), damageCanvas=document.getElementById('damage'), dirtCanvas=document.getElementById('dirt');
const s=sceneCanvas.getContext('2d',{alpha:false}), col=colourCanvas.getContext('2d',{alpha:true}), d=damageCanvas.getContext('2d',{alpha:true}), di=dirtCanvas.getContext('2d',{alpha:true});
const audio=document.getElementById('audio'), starter=document.getElementById('starter'), startBtn=document.getElementById('startBtn'), btnPlay=document.getElementById('play');
const rSeek=document.getElementById('seek'), rVol=document.getElementById('vol'), tTime=document.getElementById('time'), tDur=document.getElementById('dur');

let audioCtx,src,gain,analyser,freqData,timeData,vids={},isPlaying=false,frame=0,lastBeat=-1,lastBar=-1;
let seq=0,rep=0,clip=0,nextChange=0,gateX=0,gateY=0,hardFlash=0,loopFrames=0,loopTime=0,tearFlash=0,modeUntil=0,scratchMode='worn';
let gestures=[],burns=[];

const pad=x=>(x<10?'0':'')+x;
const fmt=t=>(!isFinite(t)?'0:00':((t/60)|0)+':'+pad((t%60)|0));
const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function paramsAt(t){let p=TIMELINE[0];for(const q of TIMELINE){if(t>=q.at)p=q;else break;}return p;}

function beatPhase(t){
 const beatDur = 60 / BPM;
 return (t % beatDur) / beatDur;
}
function nearKick(t, window=0.09){
 const ph = beatPhase(t);
 return ph < window || ph > 1-window;
}
function beatIndex(t){
 return Math.floor(t * BPM / 60);
}
function isBarStart(t){
 return beatIndex(t) % 4 === 0 && nearKick(t,.11);
}
function grindMoment(t){
 // Deliberate dense moments where the footage almost stops.
 return (t>137 && t<141) || (t>220 && t<224) || (t>288 && t<293);
}


function resize(){
 const r=wrap.getBoundingClientRect(),dpr=Math.min(devicePixelRatio||1,2);
 [sceneCanvas,colourCanvas,damageCanvas,dirtCanvas].forEach(c=>{c.width=Math.floor(r.width*dpr);c.height=Math.floor(r.height*dpr);c.style.width=r.width+'px';c.style.height=r.height+'px';});
 [s,col,d,di].forEach(cx=>cx.setTransform(dpr,0,0,dpr,0,0));
}
addEventListener('resize',resize,{passive:true}); resize();

function makeVideos(){
 for(const [k,u] of Object.entries(CLIPS)){
  const v=document.createElement('video');
  v.className='hiddenVideo'; v.src=u; v.crossOrigin='anonymous'; v.loop=true; v.muted=true; v.playsInline=true; v.preload='auto'; v.playbackRate=.55;
  document.body.appendChild(v); vids[k]=v;
 }
}
async function startVideos(){for(const v of Object.values(vids)){try{await v.play();}catch(e){console.warn('video issue',v.src,e);}}}
function currentVid(){return vids[SEQUENCES[seq][clip]];}
function advanceClip(){
 const p=paramsAt(audio.currentTime);
 clip++;
 if(clip>=SEQUENCES[seq].length){clip=0;rep++;if(rep>=p.repeats){rep=0;seq=(seq+1)%SEQUENCES.length;}}
 const v=currentVid();
 if(v&&v.duration&&isFinite(v.duration)){try{v.currentTime=rand(0,Math.max(.25,v.duration-1.2));}catch(e){} v.playbackRate=p.slow+rand(-.06,.08);}
 nextChange=audio.currentTime+rand(p.cutMin,p.cutMax);
 hardFlash=.06+Math.random()*.08;
 if(Math.random()<.12+p.damage*.12 || grindMoment(audio.currentTime)){loopFrames=Math.floor(rand(6, grindMoment(audio.currentTime)?34:16)); if(v)loopTime=v.currentTime;}
}
function setupAudio(){
 const AC=AudioContext||webkitAudioContext; audioCtx=new AC();
 src=audioCtx.createMediaElementSource(audio); gain=audioCtx.createGain(); gain.gain.value=Number(rVol.value);
 analyser=audioCtx.createAnalyser(); analyser.fftSize=2048; analyser.smoothingTimeConstant=.66;
 freqData=new Uint8Array(analyser.frequencyBinCount); timeData=new Uint8Array(analyser.fftSize);
 src.connect(gain); gain.connect(analyser); gain.connect(audioCtx.destination);
}
function band(a,b){
 if(!freqData||!audioCtx)return 0;
 const ny=audioCtx.sampleRate/2, sidx=Math.floor(a/ny*freqData.length), eidx=Math.floor(b/ny*freqData.length);
 let sum=0,n=0; for(let i=sidx;i<=eidx&&i<freqData.length;i++){sum+=freqData[i];n++;}
 return n?sum/(n*255):0;
}
function rms(){if(!timeData)return 0;let sum=0;for(let i=0;i<timeData.length;i++){const v=(timeData[i]-128)/128;sum+=v*v;}return Math.sqrt(sum/timeData.length);}
function drawCover(ctx,v,w,h,alpha=1,dx=0,dy=0,zoom=1){
 if(!v||v.readyState<2)return false;
 const scale=Math.max(w/v.videoWidth,h/v.videoHeight)*zoom,dw=v.videoWidth*scale,dh=v.videoHeight*scale;
 ctx.save();ctx.globalAlpha=alpha;ctx.drawImage(v,(w-dw)/2+dx,(h-dh)/2+dy,dw,dh);ctx.restore();return true;
}
function updateScratchMode(t,p,bass,highs,barPulse){
 if(t>modeUntil||barPulse&&Math.random()<.32){
  const r=Math.random();
  if(r<.42-p.damage*.18)scratchMode='worn';
  else if(r<.78-p.damage*.08)scratchMode='damaged';
  else scratchMode='vandalised';
  modeUntil=t+rand(1.6,5.5);
 }
 if(bass>.64||highs>.70||p.outro&&Math.random()<.18){scratchMode='vandalised';modeUntil=t+rand(.6,1.8);}
}
function spawnGesture(w,h,p,kindOverride=null){
 const kinds=['forest','slash','spiral','nest','claw','scribble','xmarks','scrape','square','triangle','triangle','triangle','arrow','parallel','collapsing'];
 const kind=kindOverride||kinds[Math.floor(Math.random()*kinds.length)];
 gestures.push({kind,x:rand(w*.08,w*.92),y:rand(h*.08,h*.92),r:rand(w*.08,w*.42)*(1+p.scratch*.5),len:rand(w*.30,w*1.2),angle:rand(-Math.PI,Math.PI),life:Math.floor(rand(3,18)),maxLife:18,alpha:rand(.25,.85)*(0.5+p.scratch),width:rand(2,9)*(0.7+p.scratch*.6),seed:Math.random()*1000});
 gestures=gestures.slice(-24);
}
function drawJaggedLine(ctx,pts,width,alpha){
 ctx.save();ctx.lineWidth=width;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle=`rgba(255,248,230,${alpha})`;ctx.shadowColor=`rgba(255,255,255,${alpha*.35})`;ctx.shadowBlur=width*.6;ctx.beginPath();
 pts.forEach((p,i)=>{if(i===0)ctx.moveTo(p[0],p[1]);else ctx.lineTo(p[0],p[1]);});
 ctx.stroke();ctx.restore();
}
function roughShapeLine(points,width,alpha){
 drawJaggedLine(d,points.map(pt=>[pt[0]+rand(-8,8),pt[1]+rand(-8,8)]),width,alpha);
}

function drawGesture(g,w,h,p,bass,highs){
 const f=clamp(g.life/g.maxLife,0,1),a=g.alpha*(.35+f*.65);
 const degenerate=(1-f)*p.scratch + bass*.35;
 d.save();d.translate(g.x,g.y);d.rotate(g.angle+Math.sin((frame+g.seed)*.08)*.05);
 if(g.kind==='forest'){
  const count=Math.floor(5+p.scratch*16+highs*10);
  for(let i=0;i<count;i++){const x=rand(-g.r,g.r),len=rand(h*.25,h*.95);let pts=[];for(let k=0;k<7;k++)pts.push([x+rand(-12,12),-len*.5+k*len/6+rand(-18,18)]);drawJaggedLine(d,pts,g.width*rand(.55,1.15),a*rand(.45,.95));}
 }else if(g.kind==='parallel'){
  const count=Math.floor(rand(4,12)+p.scratch*8);
  for(let c=0;c<count;c++){const off=(c-count/2)*rand(10,22);let pts=[],len=g.len*rand(.35,.9);for(let k=0;k<8;k++)pts.push([-len*.5+k*len/7,off+Math.sin(k+frame*.11)*10+rand(-7,7)]);drawJaggedLine(d,pts,g.width*rand(.45,1.2),a*rand(.55,1));}
 }else if(g.kind==='slash'){
  const count=Math.floor(rand(1,5));
  for(let j=0;j<count;j++){let pts=[],len=g.len*rand(.45,1);for(let k=0;k<9;k++)pts.push([-len*.5+k*len/8,rand(-40,40)+Math.sin(k+frame*.2)*20]);drawJaggedLine(d,pts,g.width*rand(.8,1.7),a);}
 }else if(g.kind==='spiral'||g.kind==='nest'){
  const turns=g.kind==='nest'?5.8:3.4,count=g.kind==='nest'?3:1;
  const pulse=1+Math.sin(frame*.09+g.seed)*(.18+p.scratch*.25);
  for(let c=0;c<count;c++){let pts=[];for(let i=0;i<80;i++){const ang=i*.23+c*.7+Math.sin(frame*.04)*.12,rr=(i/80)*g.r*pulse*(1+rand(-.04,.04));pts.push([Math.cos(ang*turns/3)*rr+rand(-6,6)*degenerate,Math.sin(ang*turns/3)*rr+rand(-6,6)*degenerate]);}drawJaggedLine(d,pts,g.width*rand(.45,1.15),a*rand(.5,.98));}
 }else if(g.kind==='square'){
  const r=g.r*(.55+Math.sin(frame*.08+g.seed)*.18);
  const pts=[[-r,-r],[r,-r],[r,r],[-r,r],[-r,-r]];
  for(let k=0;k<2+Math.floor(p.scratch*3);k++) roughShapeLine(pts,g.width*rand(.45,1.2),a*rand(.45,.9));
 }else if(g.kind==='triangle'){
  const r=g.r*(.65+Math.sin(frame*.07+g.seed)*.22);
  const pts=[[0,-r],[r*.9,r*.7],[-r*.9,r*.7],[0,-r]];
  for(let k=0;k<2+Math.floor(p.scratch*3);k++) roughShapeLine(pts,g.width*rand(.45,1.2),a*rand(.45,.9));
 }else if(g.kind==='arrow'){
  const len=g.len*rand(.25,.7);
  const pts=[[-len*.5,0],[len*.5,0],[len*.28,-len*.18],[len*.5,0],[len*.28,len*.18]];
  for(let k=0;k<2+Math.floor(p.scratch*3);k++) roughShapeLine(pts,g.width*rand(.5,1.25),a*rand(.5,.95));
 }else if(g.kind==='collapsing'){
  let pts=[]; const n=50;
  for(let i=0;i<n;i++){const rr=g.r*(1-i/n)*(1+Math.sin(frame*.11+i)*.25);const ang=i*.55+frame*.04;pts.push([Math.cos(ang)*rr+rand(-22,22)*degenerate,Math.sin(ang)*rr+rand(-22,22)*degenerate]);}
  drawJaggedLine(d,pts,g.width*rand(.7,1.5),a);
 }else if(g.kind==='claw'){
  const count=Math.floor(rand(4,9));
  for(let c=0;c<count;c++){const off=(c-count/2)*rand(12,24);let pts=[],len=g.len*rand(.25,.65);for(let k=0;k<8;k++)pts.push([-len*.5+k*len/7,off+Math.sin(k*.9+frame*.12)*14+rand(-10,10)]);drawJaggedLine(d,pts,g.width*rand(.45,1),a*rand(.55,1));}
 }else if(g.kind==='xmarks'){
  const count=Math.floor(rand(3,12));
  for(let c=0;c<count;c++){const x=rand(-g.r,g.r),y=rand(-g.r,g.r),sz=rand(12,45);drawJaggedLine(d,[[x-sz,y-sz],[x+sz,y+sz]],g.width*.55,a*.8);drawJaggedLine(d,[[x+sz,y-sz],[x-sz,y+sz]],g.width*.55,a*.8);}
 }else if(g.kind==='scrape'){
  const count=Math.floor(rand(5,16));
  for(let c=0;c<count;c++){let pts=[],yy=rand(-g.r,g.r),len=g.len*rand(.2,.55);for(let k=0;k<5;k++)pts.push([-len*.5+k*len/4,yy+rand(-18,18)]);drawJaggedLine(d,pts,g.width*rand(.4,1.1),a*rand(.35,.75));}
 }else{
  let pts=[];for(let i=0;i<50;i++)pts.push([rand(-g.r,g.r),rand(-g.r,g.r)]);drawJaggedLine(d,pts,g.width*.6,a*.65);
 }
 d.restore();
}

function drawScratchGestures(w,h,p,bass,highs,beatPulse,barPulse){
 let spawn=0;
 if(scratchMode==='worn')spawn=.018+p.scratch*.025+highs*.04;
 if(scratchMode==='damaged')spawn=.055+p.scratch*.07+highs*.08;
 if(scratchMode==='vandalised')spawn=.14+p.scratch*.13+highs*.16+bass*.10;
 const tNow=audio.currentTime;
 const grind=grindMoment(tNow);
 if(p.openingRamp) spawn += .045;
 if(grind) spawn += .24;

 // Most major geometry changes are beat-locked: kicks, half-bars and bars.
 const beatLocked = nearKick(tNow,.12);
 if(beatLocked && Math.random()<spawn*1.35) spawnGesture(w,h,p);
 if(beatPulse && Math.random()<p.scratch*.18+bass*.14) spawnGesture(w,h,p,scratchMode==='vandalised'?'slash':null);
 if(barPulse && (scratchMode==='vandalised'||grind) && Math.random()<.34) spawnGesture(w,h,p,'forest');
 if(barPulse && Math.random()<.24+p.scratch*.22) spawnGesture(w,h,p,Math.random()<.34?'triangle':(Math.random()<.5?'spiral':'parallel'));

 gestures=gestures.filter(g=>g.life-- > 0);
 for(const g of gestures)drawGesture(g,w,h,p,bass,highs);

 const baseHair = grind ? 10 : (scratchMode==='worn'?0:scratchMode==='damaged'?2:4);
 const hairCount=Math.floor(baseHair+highs*(grind?18:(scratchMode==='vandalised'?8:3)));
 for(let i=0;i<hairCount;i++){const x=rand(0,w),alpha=rand(.08,.35)*(0.6+p.scratch);d.strokeStyle=`rgba(255,248,226,${alpha})`;d.lineWidth=rand(.8,2.4);d.beginPath();d.moveTo(x,rand(-h*.1,h*.9));d.bezierCurveTo(x+rand(-40,40),rand(0,h),x+rand(-40,40),rand(0,h),x+rand(-35,35),rand(h*.1,h*1.1));d.stroke();}
}
function drawColour(w,h,p){
 col.clearRect(0,0,w,h);
 if(p.wash&&p.washA>0){col.fillStyle=p.wash+p.washA+")";col.fillRect(0,0,w,h);const g=col.createRadialGradient(w*.45,h*.45,10,w*.5,h*.55,w*.7);g.addColorStop(0,p.wash+(p.washA*.55)+")");g.addColorStop(1,"rgba(0,0,0,0)");col.fillStyle=g;col.fillRect(0,0,w,h);}
}
function drawBurns(w,h,bass,p){
 if(Math.random()<.002+bass*.016+p.damage*.008)burns.push({x:rand(w*.1,w*.9),y:rand(h*.1,h*.9),r:rand(90,260)*(1+bass+p.damage),life:rand(18,58)});
 burns=burns.filter(b=>b.life-- > 0).slice(-8);
 for(const b of burns){const f=clamp(b.life/58,0,1),r=b.r*(1.18-f*.18),g=d.createRadialGradient(b.x,b.y,0,b.x,b.y,r);g.addColorStop(0,`rgba(255,250,222,${(.14+bass*.22)*f})`);g.addColorStop(.25,`rgba(235,112,38,${(.08+bass*.10)*f})`);g.addColorStop(.68,`rgba(65,18,7,${(.10+p.damage*.12)*f})`);g.addColorStop(1,'rgba(0,0,0,0)');d.fillStyle=g;d.beginPath();d.arc(b.x,b.y,r,0,Math.PI*2);d.fill();}
}
function drawDirt(w,h,bass,highs,p){
 di.clearRect(0,0,w,h);di.fillStyle='rgba(0,0,0,.30)';di.fillRect(0,0,22,h);di.fillRect(w-22,0,22,h);di.fillStyle=`rgba(0,0,0,${.22+bass*.10})`;
 for(let y=-20;y<h+40;y+=42){di.fillRect(9+Math.sin(frame*.03+y)*2,y,13,19);di.fillRect(w-22+Math.sin(frame*.03+y)*2,y+8,13,19);}
 const dust=55+Math.floor(highs*85+p.damage*60);
 for(let i=0;i<dust;i++){const dark=Math.random()<.64;di.fillStyle=dark?`rgba(0,0,0,${rand(.012,.050)})`:`rgba(255,245,220,${rand(.010,.040)})`;di.beginPath();di.arc(rand(0,w),rand(0,h),Math.random()<.9?rand(.3,1.6):rand(2,5),0,Math.PI*2);di.fill();}
}
function render(){
 requestAnimationFrame(render);
 const w=wrap.clientWidth,h=wrap.clientHeight;
 if(!isPlaying||!analyser){s.fillStyle='#15100a';s.fillRect(0,0,w,h);return;}
 frame++;analyser.getByteFrequencyData(freqData);analyser.getByteTimeDomainData(timeData);
 const t=audio.currentTime,p=paramsAt(t),bass=clamp(band(35,165)*1.45,0,1),highs=clamp(band(2600,9000)*1.55,0,1),mids=clamp(band(520,2600)*1.2,0,1),energy=clamp(rms()*2.7,0,1);
 const beat=Math.floor(t*BPM/60),bar=Math.floor(beat/BEATS_PER_BAR),beatPulse=beat!==lastBeat,barPulse=bar!==lastBar;
 if(beatPulse){lastBeat=beat;if(bass>.28||scratchMode==='vandalised'){gateX=rand(-9,9)*(bass+p.damage);gateY=rand(-6,6)*(bass+p.damage);}if(bass>.58)tearFlash=.18;}
 if(barPulse){lastBar=bar;if(Math.random()<.16+p.damage*.24)burns.push({x:rand(w*.1,w*.9),y:rand(h*.1,h*.9),r:rand(120,360)*(1+bass),life:rand(20,52)});}
 if(t>nextChange)advanceClip();
 updateScratchMode(t,p,bass,highs,barPulse);
 const v=currentVid();
 if(loopFrames>0&&v&&v.duration){
 loopFrames--;
 const amp = grindMoment(t) ? .035 : .09;
 try{v.currentTime=loopTime+Math.sin(loopFrames*.9)*amp;}catch(e){}
}
if(grindMoment(t)&&v&&v.duration&&Math.random()<.55){
 try{v.playbackRate=.16+Math.random()*.10;}catch(e){}
}
 s.fillStyle=`rgba(5,3,1,${.045+p.damage*.020})`;s.fillRect(0,0,w,h);
 const bleach=p.bleach||0,bright=.56+energy*.10+bleach*.44,contrast=.78+mids*.13-bleach*.16,sat=.68-p.damage*.16-bleach*.50;
 s.filter=`sepia(${.32+p.damage*.10}) grayscale(${.20+p.damage*.18+bleach*.44}) contrast(${contrast}) brightness(${bright}) saturate(${sat})`;
 const openingVis=p.openingRamp?clamp((t/54)**1.65,0.025,1):1;
 drawCover(s,v,w,h,openingVis,gateX+rand(-.4,.4),gateY+rand(-.4,.4),1.035+p.damage*.028);
 if(p.damage>.28&&Math.random()<.08+p.damage*.18){const names=SEQUENCES[(seq+1)%SEQUENCES.length],v2=vids[names[Math.floor(Math.random()*names.length)]];s.globalCompositeOperation='screen';drawCover(s,v2,w,h,.07+p.damage*.11,-gateX*1.5+rand(-8,8),-gateY*1.5+rand(-6,6),1.06);s.globalCompositeOperation='source-over';}
 s.filter='none';
 const flick=(Math.random()<p.flicker)?rand(.04,.22)*p.flicker:0;
 s.fillStyle=`rgba(226,209,170,${.065+p.damage*.10+flick})`;s.fillRect(0,0,w,h);
 if(hardFlash>0){s.fillStyle=`rgba(255,244,215,${hardFlash})`;s.fillRect(0,0,w,h);hardFlash*=.74;}
 gateX*=.82;gateY*=.82;
 drawColour(w,h,p);
 d.clearRect(0,0,w,h);drawBurns(w,h,bass,p);drawScratchGestures(w,h,p,bass,highs,beatPulse,barPulse);
 if(Math.random()<.026+bass*.025+p.flicker*.045){d.fillStyle=`rgba(255,243,214,${.05+bass*.16+p.flicker*.10})`;d.fillRect(0,0,w,h);}
 if(tearFlash>0){d.fillStyle=`rgba(0,0,0,${tearFlash})`;d.fillRect(0,rand(0,h),w,rand(20,90));tearFlash*=.65;}
 const whiteBase=p.white||0;
 if(whiteBase>0){let pulse=whiteBase;if(p.name==="whiteout")pulse=1.0;if(p.name==="outro"&&t<290)pulse=1-(t-287)/3;d.fillStyle=`rgba(255,252,236,${clamp(pulse,0,1)})`;d.fillRect(0,0,w,h);}
 // Exact 00:54 bleach accent, just before the full white frame.
 if(t>52.95 && t<53.55){
   const q=1-Math.abs(t-53.25)/.30;
   d.fillStyle=`rgba(255,252,236,${clamp(q*.78,0,1)})`;
   d.fillRect(0,0,w,h);
 }
 if(barPulse && p.damage>.45 && Math.random()<.28){
   d.fillStyle=`rgba(255,248,226,${.05+p.damage*.08})`;
   d.fillRect(0,0,18,h);
   d.fillRect(w-18,0,18,h);
 }
 drawDirt(w,h,bass,highs,p);
 if(t>318){
 const end=clamp((t-318)/6,0,1);
 const white=clamp((t-318)/2.2,0,1)*(1-end);
 d.fillStyle=`rgba(255,252,238,${white*.85})`;d.fillRect(0,0,w,h);
 s.fillStyle=`rgba(0,0,0,${end})`;s.fillRect(0,0,w,h);
}
}
async function start(){
 if(!Object.keys(vids).length)makeVideos();
 if(!audioCtx)setupAudio();
 if(audioCtx.state==='suspended')await audioCtx.resume();
 await startVideos();await audio.play();isPlaying=true;starter.style.display='none';btnPlay.textContent='⏸';if(!nextChange)advanceClip();
}
startBtn.onclick=start;starter.onclick=e=>e.target===starter&&start();
btnPlay.onclick=async()=>{if(audio.paused)await start();else{audio.pause();Object.values(vids).forEach(v=>v.pause());isPlaying=false;btnPlay.textContent='▶';}};
audio.addEventListener('ended',()=>{isPlaying=false;btnPlay.textContent='▶';});
audio.addEventListener('loadedmetadata',()=>{tDur.textContent=fmt(audio.duration||TRACK_SECONDS);});
audio.ontimeupdate=()=>{const dur=audio.duration||TRACK_SECONDS;tTime.textContent=fmt(audio.currentTime);tDur.textContent=fmt(dur);if(dur)rSeek.value=audio.currentTime/dur;};
rSeek.oninput=e=>{const dur=audio.duration||TRACK_SECONDS;if(dur)audio.currentTime=Number(e.target.value)*dur;};
rVol.oninput=e=>{const v=Number(e.target.value);audio.volume=v;if(gain)gain.gain.value=v;};
render();
</script>
