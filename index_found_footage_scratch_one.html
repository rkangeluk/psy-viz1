<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>One — Found Footage Scratch Film</title>
<style>
html,body{margin:0;height:100%;background:#050403;font:400 12px/22px Arial,sans-serif;color:#332e27}
#wrap{position:relative;width:100%;height:100vh;overflow:hidden;background:#030201}
canvas{position:absolute;inset:0;width:100%;height:100%}
#scene{z-index:1}
#damage{z-index:2;mix-blend-mode:screen;opacity:.98}
#dirt{z-index:3;mix-blend-mode:multiply;opacity:.75}
#vignette{position:absolute;inset:-5%;z-index:4;pointer-events:none;background:radial-gradient(ellipse at center,rgba(255,241,202,.05) 0%,rgba(0,0,0,0) 40%,rgba(0,0,0,.78) 100%),linear-gradient(90deg,rgba(0,0,0,.52),transparent 13%,transparent 87%,rgba(0,0,0,.52))}
#frame{position:absolute;inset:0;z-index:5;pointer-events:none;box-shadow:inset 0 0 0 1px rgba(255,241,203,.05),inset 0 0 80px rgba(0,0,0,.88)}
.ui{position:absolute;left:0;right:0;bottom:0;z-index:20;display:flex;align-items:center;gap:.75rem;padding:.6rem .8rem;background:rgba(239,232,213,.88);opacity:0;transform:translateY(8px);transition:.25s ease;pointer-events:none}
#wrap:hover .ui{opacity:1;transform:none;pointer-events:auto}
.btn{all:unset;cursor:pointer;width:36px;height:36px;border-radius:9999px;text-align:center;background:rgba(0,0,0,.06)}
.label{min-width:52px;text-align:right;opacity:.85}.grow{flex:1}.spacer{width:8px}
input[type=range]{appearance:none;height:4px;width:240px;background:rgba(0,0,0,.18);border-radius:999px}
input[type=range]::-webkit-slider-thumb{appearance:none;width:14px;height:14px;border-radius:50%;background:#3e3a33}
.starter{position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;background:radial-gradient(circle at center,rgba(255,239,196,.08),rgba(0,0,0,.78)),linear-gradient(180deg,rgba(0,0,0,.20),rgba(0,0,0,.72))}
.title{font-size:clamp(28px,4vw,50px);color:#efe4cd;letter-spacing:.13em;text-transform:uppercase;text-shadow:0 2px 20px rgba(0,0,0,.95)}
.subtitle{color:rgba(239,228,205,.72);letter-spacing:.08em;text-transform:uppercase;margin-top:-18px}
.play-oval{all:unset;cursor:pointer;display:flex;align-items:center;justify-content:center;width:140px;height:50px;border-radius:9999px;background:rgba(220,207,163,.72);border:2px solid rgba(105,92,55,.9);box-shadow:0 6px 24px rgba(0,0,0,.5)}
.play-oval svg{width:20px;height:20px;fill:#4a4021}
.hiddenVideo{position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;pointer-events:none}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="scene"></canvas><canvas id="damage"></canvas><canvas id="dirt"></canvas>
  <div id="vignette"></div><div id="frame"></div>
  <div class="ui">
    <button id="play" class="btn">▶</button><span id="time" class="label">0:00</span>
    <input id="seek" type="range" min="0" max="1" step="0.001" value="0" class="grow">
    <span id="dur" class="label">5:24</span><div class="spacer"></div>
    <input id="vol" type="range" min="0" max="1" step="0.01" value="0.9" style="width:110px">
  </div>
  <div id="starter" class="starter">
    <div class="title">One</div><div class="subtitle">found footage scratch film</div>
    <button id="startBtn" class="play-oval" aria-label="Play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
  </div>
  <audio id="player" preload="auto" crossorigin="anonymous"><source src="one.mp3" type="audio/mpeg"></audio>
</div>

<script>
const BPM=140, TRACK_SECONDS=324, BEATS_PER_BAR=4;
const CLIP_URLS=[
 "https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/mayor.mp4",
 "https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/fete1.mp4",
 "https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/fete2.mp4",
 "https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/hatman.mp4",
 "https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/poolparty.mp4",
 "https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/clown.mp4",
 "https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/dance.mp4",
 "https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/swimming.mp4",
 "https://pub-72e9e2f20fd24867ab095d7021d419db.r2.dev/NY.mp4"
];
const ACTS=[
 {start:0,end:70,damage:.16,paint:.05,decay:.08,cuts:10},
 {start:70,end:150,damage:.40,paint:.18,decay:.20,cuts:7},
 {start:150,end:240,damage:.63,paint:.52,decay:.42,cuts:5},
 {start:240,end:324,damage:.88,paint:.86,decay:.72,cuts:3}
];

const wrap=document.getElementById('wrap'), sceneCanvas=document.getElementById('scene'), damageCanvas=document.getElementById('damage'), dirtCanvas=document.getElementById('dirt');
const scene=sceneCanvas.getContext('2d',{alpha:false}), damage=damageCanvas.getContext('2d',{alpha:true}), dirt=dirtCanvas.getContext('2d',{alpha:true});
const audio=document.getElementById('player'), starter=document.getElementById('starter'), startBtn=document.getElementById('startBtn'), btnPlay=document.getElementById('play');
const rSeek=document.getElementById('seek'), rVol=document.getElementById('vol'), tTime=document.getElementById('time'), tDur=document.getElementById('dur');

let audioCtx,sourceNode,gainNode,analyser,freqData,timeData,isPlaying=false;
let videos=[],currentVideo=0,nextCutAt=0,frame=0,lastBeat=-1,lastBar=-1,gateX=0,gateY=0,hardFlash=0,freezeFrames=0,stutterFrames=0;
let scratchSeeds=[],paintEvents=[],burnEvents=[],grandGestures=[];

const pad=s=>(s<10?'0':'')+s;
const fmt=t=>(!isFinite(t)?'0:00':((t/60)|0)+':'+pad((t%60)|0));
const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));
const rand=(min,max)=>min+Math.random()*(max-min);
function getAct(t){return ACTS.find(a=>t>=a.start&&t<a.end)||ACTS[ACTS.length-1];}

function resize(){
 const r=wrap.getBoundingClientRect(),dpr=Math.min(window.devicePixelRatio||1,2);
 [sceneCanvas,damageCanvas,dirtCanvas].forEach(c=>{c.width=Math.floor(r.width*dpr);c.height=Math.floor(r.height*dpr);c.style.width=r.width+'px';c.style.height=r.height+'px';});
 [scene,damage,dirt].forEach(cx=>cx.setTransform(dpr,0,0,dpr,0,0));
}
window.addEventListener('resize',resize,{passive:true});resize();

function makeVideos(){
 videos=CLIP_URLS.map(url=>{
  const v=document.createElement('video');
  v.className='hiddenVideo'; v.src=url; v.crossOrigin='anonymous'; v.muted=true; v.loop=true; v.playsInline=true; v.preload='auto'; v.playbackRate=.72+Math.random()*.32;
  document.body.appendChild(v); return v;
 });
}
async function startVideos(){for(const v of videos){try{await v.play();}catch(e){console.warn('Video play issue',v.src,e);}}}
function chooseNewVideo(){
 if(!videos.length)return;
 let n=currentVideo; while(n===currentVideo&&videos.length>1)n=Math.floor(Math.random()*videos.length);
 currentVideo=n; const v=videos[currentVideo];
 if(v.duration&&isFinite(v.duration)){try{v.currentTime=rand(0,Math.max(.2,v.duration-1));}catch(e){}}
 hardFlash=.18;
}
function setupAudio(){
 const AC=window.AudioContext||window.webkitAudioContext; audioCtx=new AC();
 sourceNode=audioCtx.createMediaElementSource(audio); gainNode=audioCtx.createGain(); gainNode.gain.value=Number(rVol.value);
 analyser=audioCtx.createAnalyser(); analyser.fftSize=2048; analyser.smoothingTimeConstant=.72;
 freqData=new Uint8Array(analyser.frequencyBinCount); timeData=new Uint8Array(analyser.fftSize);
 sourceNode.connect(gainNode); gainNode.connect(analyser); gainNode.connect(audioCtx.destination);
}
function bandAverage(fromHz,toHz){
 if(!freqData||!audioCtx)return 0; const ny=audioCtx.sampleRate/2, s=Math.floor((fromHz/ny)*freqData.length), e=Math.floor((toHz/ny)*freqData.length);
 let sum=0,count=0; for(let i=s;i<=e&&i<freqData.length;i++){sum+=freqData[i];count++;} return count?sum/(count*255):0;
}
function waveformRMS(){
 if(!timeData)return 0; let sum=0; for(let i=0;i<timeData.length;i++){const v=(timeData[i]-128)/128;sum+=v*v;} return Math.sqrt(sum/timeData.length);
}
function drawVideoCover(ctx,v,w,h,alpha=1,dx=0,dy=0,scale=1){
 if(!v||v.readyState<2)return false; const vw=v.videoWidth||16,vh=v.videoHeight||9,s=Math.max(w/vw,h/vh)*scale,dw=vw*s,dh=vh*s;
 ctx.save();ctx.globalAlpha=alpha;ctx.drawImage(v,(w-dw)/2+dx,(h-dh)/2+dy,dw,dh);ctx.restore(); return true;
}
function drawScene(w,h,t,act,bass,mids,energy){
 scene.fillStyle=`rgba(6,4,2,${.055+act.decay*.035})`; scene.fillRect(0,0,w,h);
 const v=videos[currentVideo],v2=videos[(currentVideo+1)%Math.max(1,videos.length)];
 if(stutterFrames>0&&v&&v.duration){stutterFrames--;try{v.currentTime=Math.max(0,v.currentTime-.045);}catch(e){}}
 const gx=gateX+rand(-.4,.4), gy=gateY+rand(-.4,.4), zoom=1.035+act.decay*.05+bass*.025;
 scene.filter=`grayscale(${.28+act.decay*.25}) sepia(${.36+act.decay*.14}) contrast(${.74+mids*.18}) brightness(${.58+energy*.12}) saturate(${.64-act.decay*.18})`;
 let ok=drawVideoCover(scene,v,w,h,1,gx,gy,zoom);
 if(act.decay>.25&&Math.random()<.34+act.decay*.3){scene.globalCompositeOperation='screen';drawVideoCover(scene,v2,w,h,.10+act.decay*.18,-gx*2+rand(-12,12),-gy*2+rand(-8,8),1.06+act.decay*.07);scene.globalCompositeOperation='source-over';}
 scene.filter='none'; if(!ok){scene.fillStyle='#1b140d';scene.fillRect(0,0,w,h);}
 scene.fillStyle=`rgba(226,209,170,${.09+act.decay*.17})`; scene.fillRect(0,0,w,h);
 if(hardFlash>0){scene.fillStyle=`rgba(255,244,215,${hardFlash})`;scene.fillRect(0,0,w,h);hardFlash*=.78;}
}
function addScratchBurst(w,h,amount,extra=false){
 const n=Math.floor(rand(5,12)+amount*(extra?90:36));
 for(let i=0;i<n;i++)scratchSeeds.push({x:rand(20,w-20),y:rand(-h*.25,h),len:rand(h*.25,h*(extra?1.85:1.15)),drift:rand(-40,40)*(extra?1.8:1),life:rand(22,100),width:Math.random()<.78?1:rand(1.8,7),alpha:rand(.10,.58),curve:rand(-1,1)});
 scratchSeeds=scratchSeeds.slice(-280);
}
function addGrandGesture(w,h,amount){
 grandGestures.push({x:rand(w*.1,w*.9),y:rand(h*.1,h*.9),r:rand(w*.18,w*.72)*(1+amount*.35),life:rand(28,82),type:Math.random()<.45?'arc':'slash',spin:rand(-.04,.04),alpha:rand(.12,.40)});
 grandGestures=grandGestures.slice(-20);
}
function updateScratches(ctx,w,h,highs,act){
 if(Math.random()<.22+highs*.72+act.damage*.34)addScratchBurst(w,h,act.damage,false);
 if(Math.random()<.018+highs*.09+act.damage*.04)addScratchBurst(w,h,act.damage,true);
 if(Math.random()<.012+act.paint*.025)addGrandGesture(w,h,act.damage);
 scratchSeeds=scratchSeeds.filter(s=>s.life>0);
 for(const s of scratchSeeds){s.life--;s.x+=rand(-1.2,1.2);const a=clamp((s.life/85)*s.alpha*(1+highs*.8),0,.7);ctx.strokeStyle=`rgba(255,247,222,${a})`;ctx.lineWidth=s.width;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.bezierCurveTo(s.x+s.drift,s.y+s.len*.28,s.x-s.drift*.6,s.y+s.len*.72,s.x+s.drift*s.curve,s.y+s.len);ctx.stroke();}
 grandGestures=grandGestures.filter(g=>g.life>0);
 for(const g of grandGestures){g.life--;const f=clamp(g.life/80,0,1);ctx.save();ctx.translate(g.x,g.y);ctx.rotate(frame*g.spin);ctx.strokeStyle=`rgba(255,244,215,${g.alpha*f})`;ctx.lineWidth=2+act.damage*9;ctx.lineCap='round';ctx.beginPath();if(g.type==='arc')ctx.arc(0,0,g.r,rand(0,Math.PI),rand(Math.PI,Math.PI*2.8));else{ctx.moveTo(-g.r,rand(-80,80));ctx.bezierCurveTo(-g.r*.3,-g.r*.35,g.r*.2,g.r*.35,g.r,rand(-80,80));}ctx.stroke();ctx.restore();}
}
function addPaint(w,h,act,bass){
 paintEvents.push({x:rand(w*.05,w*.95),y:rand(h*.05,h*.95),r:rand(35,190)*(1+act.paint+bass),life:rand(70,250),hue:rand(0,1),spin:rand(-.035,.035),type:Math.random()<.5?'bloom':'stroke'});
 paintEvents=paintEvents.slice(-110);
}
function updatePaint(ctx,w,h,bass,mids,act){
 if(Math.random()<.03+mids*.18+act.paint*.10)addPaint(w,h,act,bass);
 paintEvents=paintEvents.filter(p=>p.life>0);
 for(const p of paintEvents){p.life--;const f=clamp(p.life/210,0,1),alpha=f*(.025+act.paint*.10+mids*.055),red=125+p.hue*120,green=34+(1-p.hue)*80,blue=18+Math.sin(p.hue*Math.PI)*55;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(frame*p.spin);
 if(p.type==='bloom'){const g=ctx.createRadialGradient(0,0,0,0,0,p.r);g.addColorStop(0,`rgba(${red},${green},${blue},${alpha*1.65})`);g.addColorStop(.5,`rgba(${red},${green},${blue},${alpha*.7})`);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}
 else{ctx.strokeStyle=`rgba(${red},${green},${blue},${alpha*2.8})`;ctx.lineWidth=10+bass*52;ctx.lineCap='round';ctx.beginPath();for(let i=0;i<22;i++){const a=(i/21)*Math.PI*2,rr=p.r*(.2+i/21)*(.78+Math.sin(i*2.2+frame*.035)*.18),x=Math.cos(a)*rr,y=Math.sin(a*1.55)*rr*.55;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}ctx.stroke();}
 ctx.restore();}
}
function addBurn(w,h,bass,act){burnEvents.push({x:rand(w*.1,w*.9),y:rand(h*.1,h*.9),r:rand(90,280)*(1+bass+act.decay),life:rand(24,70)});burnEvents=burnEvents.slice(-14);}
function updateBurns(ctx,w,h,bass,mids,act){
 if(Math.random()<.004+bass*.028+act.decay*.012)addBurn(w,h,bass,act);
 burnEvents=burnEvents.filter(b=>b.life>0);
 for(const b of burnEvents){b.life--;const f=clamp(b.life/70,0,1),r=b.r*(1.25-f*.25),g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,r);g.addColorStop(0,`rgba(255,250,222,${(.2+bass*.3)*f})`);g.addColorStop(.22,`rgba(238,118,43,${(.12+mids*.18)*f})`);g.addColorStop(.62,`rgba(80,22,9,${(.12+act.decay*.18)*f})`);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(b.x,b.y,r,0,Math.PI*2);ctx.fill();}
}
function drawWaveEtching(ctx,w,h,mids,highs){
 if(!timeData)return; const rows=2+Math.floor(mids*9);ctx.strokeStyle=`rgba(255,232,188,${.025+highs*.18})`;ctx.lineWidth=1;
 for(let r=0;r<rows;r++){const yBase=h*((r+1)/(rows+1));ctx.beginPath();for(let x=0;x<w;x+=7){const idx=Math.floor((x/w)*timeData.length),v=(timeData[idx]-128)/128,y=yBase+v*(18+mids*100)+Math.sin(x*.022+frame*.035+r)*11;if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}ctx.stroke();}
}
function drawDust(ctx,w,h,highs,act){
 const n=28+Math.floor(highs*210+act.damage*110);ctx.fillStyle=`rgba(255,246,224,${.055+highs*.18})`;
 for(let i=0;i<n;i++){ctx.beginPath();ctx.arc(rand(0,w),rand(0,h),Math.random()<.9?rand(.3,1.5):rand(2,6),0,Math.PI*2);ctx.fill();}
}
function drawDirt(ctx,w,h,bass){
 ctx.clearRect(0,0,w,h);ctx.fillStyle='rgba(0,0,0,.34)';ctx.fillRect(0,0,22,h);ctx.fillRect(w-22,0,22,h);
 ctx.fillStyle=`rgba(0,0,0,${.30+bass*.1})`;for(let y=-20;y<h+40;y+=42){ctx.fillRect(9+Math.sin(frame*.03+y)*2,y,13,19);ctx.fillRect(w-22+Math.sin(frame*.03+y)*2,y+8,13,19);}
 for(let i=0;i<130;i++){ctx.fillStyle=`rgba(0,0,0,${rand(.012,.06)})`;ctx.beginPath();ctx.arc(rand(0,w),rand(0,h),rand(.3,2.2),0,Math.PI*2);ctx.fill();}
}
function render(){
 requestAnimationFrame(render); const w=wrap.clientWidth,h=wrap.clientHeight;
 if(!isPlaying||!analyser){scene.fillStyle='#15100a';scene.fillRect(0,0,w,h);return;}
 frame++; analyser.getByteFrequencyData(freqData); analyser.getByteTimeDomainData(timeData);
 const t=audio.currentTime,act=getAct(t),bass=clamp(bandAverage(35,165)*1.45,0,1),mids=clamp(bandAverage(520,2600)*1.2,0,1),highs=clamp(bandAverage(2600,9000)*1.6,0,1),energy=clamp(waveformRMS()*2.7,0,1);
 const beat=Math.floor((t*BPM)/60),bar=Math.floor(beat/BEATS_PER_BAR),beatPulse=beat!==lastBeat,barPulse=bar!==lastBar;
 if(beatPulse){lastBeat=beat;if(bass>.30||act.damage>.45){gateX=rand(-10,10)*(bass+act.damage);gateY=rand(-6,6)*(bass+act.damage);}if(highs>.22)addScratchBurst(w,h,act.damage,true);if(bass>.44&&Math.random()<.38+act.decay*.24)stutterFrames=Math.floor(rand(4,12));}
 if(barPulse){lastBar=bar;if(Math.random()<.3+act.decay*.35)freezeFrames=Math.floor(rand(6,22));if(Math.random()<.18+act.decay*.36)addBurn(w,h,bass,act);}
 if(t>nextCutAt){chooseNewVideo();nextCutAt=t+rand(act.cuts*.65,act.cuts*1.55);}
 gateX*=.82;gateY*=.82;drawScene(w,h,t,act,bass,mids,energy);
 damage.clearRect(0,0,w,h);damage.fillStyle=`rgba(6,3,1,${.016+act.decay*.026})`;damage.fillRect(0,0,w,h);
 updatePaint(damage,w,h,bass,mids,act);updateBurns(damage,w,h,bass,mids,act);updateScratches(damage,w,h,highs,act);drawWaveEtching(damage,w,h,mids,highs);drawDust(damage,w,h,highs,act);
 if(Math.random()<bass*.055+act.decay*.016){damage.fillStyle=`rgba(255,243,214,${.065+bass*.26})`;damage.fillRect(0,0,w,h);}
 if(Math.random()<act.decay*.045){damage.fillStyle=`rgba(0,0,0,${rand(.1,.34)})`;damage.fillRect(0,rand(0,h),w,rand(8,60));}
 drawDirt(dirt,w,h,bass);
 if(t>285){const end=clamp((t-285)/39,0,1);scene.fillStyle=`rgba(238,229,199,${end*.16})`;scene.fillRect(0,0,w,h);damage.fillStyle=`rgba(255,248,226,${end*.045})`;damage.fillRect(0,0,w,h);}
 if(t>321.5){const end=clamp((t-321.5)/2.5,0,1);damage.fillStyle=`rgba(255,248,230,${(1-end)*.28})`;damage.fillRect(0,0,w,h);scene.fillStyle=`rgba(0,0,0,${end})`;scene.fillRect(0,0,w,h);}
}
async function start(){
 if(!videos.length)makeVideos(); if(!audioCtx)setupAudio(); if(audioCtx.state==='suspended')await audioCtx.resume();
 await startVideos(); await audio.play(); isPlaying=true; starter.style.display='none'; btnPlay.textContent='⏸'; nextCutAt=0;
}
startBtn.onclick=start; starter.onclick=e=>e.target===starter&&start();
btnPlay.onclick=async()=>{if(audio.paused)await start();else{audio.pause();for(const v of videos)v.pause();isPlaying=false;btnPlay.textContent='▶';}};
audio.addEventListener('ended',()=>{isPlaying=false;btnPlay.textContent='▶';});
audio.addEventListener('loadedmetadata',()=>{tDur.textContent=fmt(audio.duration||TRACK_SECONDS);});
audio.ontimeupdate=()=>{const dur=audio.duration||TRACK_SECONDS;tTime.textContent=fmt(audio.currentTime);tDur.textContent=fmt(dur);if(dur)rSeek.value=audio.currentTime/dur;};
rSeek.oninput=e=>{const dur=audio.duration||TRACK_SECONDS;if(dur)audio.currentTime=Number(e.target.value)*dur;};
rVol.oninput=e=>{const v=Number(e.target.value);audio.volume=v;if(gainNode)gainNode.gain.value=v;};
render();
</script>
</body>
</html>
