<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>One — Scratch Film Prototype</title>
<style>
:root{--ui-bg:rgba(239,232,213,.88);--ui-fg:#332e27;--font:400 12px/22px Clarkson,"Proxima Nova","Open Sans","Helvetica Neue",Helvetica,Arial,sans-serif}*{box-sizing:border-box}html,body{margin:0;height:100%;background:#050403;color:var(--ui-fg);font:var(--font)}#wrap{position:relative;width:100%;height:100vh;overflow:hidden;background:#030201}canvas{position:absolute;inset:0;width:100%;height:100%}#scene{z-index:1}#damage{z-index:2;mix-blend-mode:screen;opacity:.95}#dirt{z-index:3;mix-blend-mode:multiply;opacity:.72}#vignette{position:absolute;inset:-5%;z-index:4;pointer-events:none;background:radial-gradient(ellipse at center,rgba(255,241,202,.04) 0%,rgba(0,0,0,0) 42%,rgba(0,0,0,.74) 100%),linear-gradient(90deg,rgba(0,0,0,.48),rgba(0,0,0,0) 13%,rgba(0,0,0,0) 87%,rgba(0,0,0,.48))}#frame{position:absolute;inset:0;z-index:5;pointer-events:none;box-shadow:inset 0 0 0 1px rgba(255,241,203,.05),inset 0 0 70px rgba(0,0,0,.85)}.ui{position:absolute;left:0;right:0;bottom:0;z-index:20;display:flex;align-items:center;gap:.75rem;padding:.6rem .8rem;background:var(--ui-bg);opacity:0;transform:translateY(8px);transition:.25s ease;pointer-events:none}#wrap:hover .ui{opacity:1;transform:none;pointer-events:auto}.btn{all:unset;cursor:pointer;width:36px;height:36px;border-radius:9999px;text-align:center;background:rgba(0,0,0,.06)}.btn:hover{background:rgba(0,0,0,.12)}.label{min-width:52px;text-align:right;opacity:.85}.grow{flex:1}.spacer{width:8px}input[type=range]{appearance:none;height:4px;width:240px;background:rgba(0,0,0,.18);border-radius:999px}input[type=range]::-webkit-slider-thumb{appearance:none;width:14px;height:14px;border-radius:50%;background:#3e3a33}.starter{position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;background:radial-gradient(circle at center,rgba(255,239,196,.08),rgba(0,0,0,.78)),linear-gradient(180deg,rgba(0,0,0,.20),rgba(0,0,0,.72))}.title{font-size:clamp(28px,4vw,50px);color:#efe4cd;letter-spacing:.13em;text-transform:uppercase;text-shadow:0 2px 20px rgba(0,0,0,.95)}.subtitle{color:rgba(239,228,205,.72);letter-spacing:.08em;text-transform:uppercase;margin-top:-18px}.play-oval{all:unset;cursor:pointer;display:flex;align-items:center;justify-content:center;width:140px;height:50px;border-radius:9999px;background:rgba(220,207,163,.72);border:2px solid rgba(105,92,55,.9);box-shadow:0 6px 24px rgba(0,0,0,.5)}.play-oval svg{width:20px;height:20px;fill:#4a4021}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="scene"></canvas><canvas id="damage"></canvas><canvas id="dirt"></canvas>
  <div id="vignette"></div><div id="frame"></div>
  <div class="ui"><button id="play" class="btn">▶</button><span id="time" class="label">0:00</span><input id="seek" type="range" min="0" max="1" step="0.001" value="0" class="grow"><span id="dur" class="label">5:24</span><div class="spacer"></div><input id="vol" type="range" min="0" max="1" step="0.01" value="0.9" style="width:110px"></div>
  <div id="starter" class="starter"><div class="title">One</div><div class="subtitle">scratch film prototype</div><button id="startBtn" class="play-oval" aria-label="Play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button></div>
  <audio id="player" preload="auto" crossorigin="anonymous"><source src="one.mp3" type="audio/mpeg"></audio>
</div>
<script>
const BPM=140,TRACK_SECONDS=324,BEATS_PER_BAR=4;
const ACTS=[{start:0,end:70,name:'recognisable',damage:.18,paint:.05,decay:.08},{start:70,end:150,name:'scratching',damage:.38,paint:.16,decay:.18},{start:150,end:240,name:'painted',damage:.58,paint:.46,decay:.36},{start:240,end:324,name:'destroyed',damage:.82,paint:.78,decay:.68}];
const wrap=document.getElementById('wrap'),sceneCanvas=document.getElementById('scene'),damageCanvas=document.getElementById('damage'),dirtCanvas=document.getElementById('dirt');
const scene=sceneCanvas.getContext('2d',{alpha:false}),damage=damageCanvas.getContext('2d',{alpha:true}),dirt=dirtCanvas.getContext('2d',{alpha:true});
const audio=document.getElementById('player'),starter=document.getElementById('starter'),startBtn=document.getElementById('startBtn'),btnPlay=document.getElementById('play'),rSeek=document.getElementById('seek'),rVol=document.getElementById('vol'),tTime=document.getElementById('time'),tDur=document.getElementById('dur');
let audioCtx,sourceNode,gainNode,analyser,freqData,timeData,isPlaying=false,frame=0,lastBeat=-1,lastBar=-1,gateX=0,gateY=0,burnEvents=[],paintEvents=[],scratchSeeds=[],fauxScene=0,fauxSceneHold=0,hardCutFlash=0,idleFrame=0;
const pad=s=>(s<10?'0':'')+s,fmt=t=>(!isFinite(t)?'0:00':((t/60)|0)+':'+pad((t%60)|0)),clamp=(v,min,max)=>Math.max(min,Math.min(max,v)),rand=(min,max)=>min+Math.random()*(max-min);
function resize(){const r=wrap.getBoundingClientRect(),dpr=Math.min(window.devicePixelRatio||1,2);for(const c of [sceneCanvas,damageCanvas,dirtCanvas]){c.width=Math.floor(r.width*dpr);c.height=Math.floor(r.height*dpr);c.style.width=r.width+'px';c.style.height=r.height+'px'}for(const cx of [scene,damage,dirt])cx.setTransform(dpr,0,0,dpr,0,0)}
window.addEventListener('resize',resize,{passive:true});resize();
function getAct(t){return ACTS.find(a=>t>=a.start&&t<a.end)||ACTS[ACTS.length-1]}
function setupAudio(){const AC=window.AudioContext||window.webkitAudioContext;audioCtx=new AC();sourceNode=audioCtx.createMediaElementSource(audio);gainNode=audioCtx.createGain();gainNode.gain.value=Number(rVol.value);analyser=audioCtx.createAnalyser();analyser.fftSize=2048;analyser.smoothingTimeConstant=.74;freqData=new Uint8Array(analyser.frequencyBinCount);timeData=new Uint8Array(analyser.fftSize);sourceNode.connect(gainNode);gainNode.connect(analyser);gainNode.connect(audioCtx.destination)}
function bandAverage(fromHz,toHz){if(!freqData||!audioCtx)return 0;const nyquist=audioCtx.sampleRate/2,start=Math.floor((fromHz/nyquist)*freqData.length),end=Math.floor((toHz/nyquist)*freqData.length);let sum=0,count=0;for(let i=start;i<=end&&i<freqData.length;i++){sum+=freqData[i];count++}return count?sum/(count*255):0}
function waveformRMS(){if(!timeData)return 0;let sum=0;for(let i=0;i<timeData.length;i++){const v=(timeData[i]-128)/128;sum+=v*v}return Math.sqrt(sum/timeData.length)}
function drawFauxScene(ctx,w,h,t,act,energy){fauxSceneHold--;if(fauxSceneHold<=0){fauxScene=(fauxScene+1+Math.floor(Math.random()*2))%7;fauxSceneHold=Math.floor(rand(180,520)/(1+act.decay*2));hardCutFlash=.16}const cameraWobble=Math.sin(t*.7)*2+gateX,cameraJitter=Math.cos(t*.43)*1.5+gateY;ctx.save();ctx.translate(cameraWobble,cameraJitter);const palettes=[['#b8ad92','#4f5544','#2b2a24','#d5c9aa'],['#aaa694','#59615b','#282d2b','#d7d0bd'],['#beb395','#5f513f','#2a211c','#dfd3b5'],['#a8aca2','#4d5a61','#252b2f','#d2d4c8']],p=palettes[fauxScene%palettes.length];ctx.fillStyle=p[0];ctx.fillRect(-20,-20,w+40,h+40);const g=ctx.createRadialGradient(w*.5,h*.45,w*.1,w*.5,h*.5,w*.72);g.addColorStop(0,'rgba(255,246,218,.12)');g.addColorStop(1,'rgba(20,12,4,.42)');ctx.fillStyle=g;ctx.fillRect(-20,-20,w+40,h+40);ctx.globalAlpha=.64;switch(fauxScene){case 0:drawClassroom(ctx,w,h,p,t);break;case 1:drawOffice(ctx,w,h,p,t);break;case 2:drawPlayground(ctx,w,h,p,t);break;case 3:drawChurchHall(ctx,w,h,p,t);break;case 4:drawIndustrialDemo(ctx,w,h,p,t);break;case 5:drawSuburbanRoom(ctx,w,h,p,t);break;case 6:drawCivicCorridor(ctx,w,h,p,t);break}ctx.restore();ctx.fillStyle=`rgba(222,209,176,${.07+act.decay*.16})`;ctx.fillRect(0,0,w,h);if(hardCutFlash>0){ctx.fillStyle=`rgba(255,244,215,${hardCutFlash})`;ctx.fillRect(0,0,w,h);hardCutFlash*=.82}}
function drawClassroom(ctx,w,h,p,t){ctx.fillStyle=p[2];for(let i=0;i<9;i++){const x=w*.08+i*w*.1;ctx.fillRect(x,h*.55+Math.sin(i+t)*2,w*.055,h*.11);ctx.fillRect(x-w*.014,h*.66,w*.085,h*.035)}ctx.fillStyle=p[1];ctx.fillRect(w*.12,h*.16,w*.76,h*.24);ctx.strokeStyle='rgba(245,235,205,.28)';ctx.lineWidth=2;for(let i=0;i<9;i++){const y=h*.20+i*h*.021;ctx.beginPath();ctx.moveTo(w*.18,y);ctx.lineTo(w*.82,y+Math.sin(t+i)*1.5);ctx.stroke()}drawVacantFigures(ctx,w,h,7,h*.45)}
function drawOffice(ctx,w,h,p,t){ctx.fillStyle=p[1];for(let i=0;i<5;i++)ctx.fillRect(w*(.08+i*.18),h*.18,w*.11,h*.2);ctx.fillStyle=p[2];for(let i=0;i<6;i++){const x=w*.08+i*w*.15;ctx.fillRect(x,h*.62,w*.12,h*.06);ctx.fillRect(x+w*.02,h*.68,w*.03,h*.13);ctx.fillRect(x+w*.08,h*.68,w*.03,h*.13)}drawVacantFigures(ctx,w,h,5,h*.47)}
function drawPlayground(ctx,w,h,p,t){ctx.strokeStyle=p[1];ctx.lineWidth=6;ctx.beginPath();ctx.arc(w*.34,h*.58,w*.18,Math.PI,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(w*.61,h*.35);ctx.lineTo(w*.78,h*.72);ctx.lineTo(w*.46,h*.72);ctx.closePath();ctx.stroke();ctx.strokeStyle=p[2];ctx.lineWidth=3;for(let i=0;i<7;i++){ctx.beginPath();ctx.moveTo(w*(.1+i*.12),h*.78);ctx.lineTo(w*(.16+i*.12),h*.58+Math.sin(t+i)*6);ctx.stroke()}}
function drawChurchHall(ctx,w,h,p,t){ctx.fillStyle=p[1];ctx.fillRect(w*.15,h*.2,w*.7,h*.42);ctx.fillStyle=p[0];for(let i=0;i<5;i++)ctx.fillRect(w*(.22+i*.12),h*.27,w*.06,h*.18);ctx.fillStyle=p[2];for(let i=0;i<8;i++)ctx.fillRect(w*.1+i*w*.11,h*.7,w*.075,h*.035);drawVacantFigures(ctx,w,h,6,h*.55)}
function drawIndustrialDemo(ctx,w,h,p,t){ctx.fillStyle=p[2];ctx.fillRect(w*.18,h*.42,w*.64,h*.22);ctx.strokeStyle=p[1];ctx.lineWidth=9;ctx.beginPath();ctx.arc(w*.28,h*.42,w*.08,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(w*.71,h*.43,w*.12,0,Math.PI*2);ctx.stroke();ctx.fillStyle=p[1];for(let i=0;i<7;i++)ctx.fillRect(w*.2+i*w*.08,h*.22,w*.038,h*.14+Math.sin(t+i)*10)}
function drawSuburbanRoom(ctx,w,h,p,t){ctx.fillStyle=p[1];ctx.fillRect(w*.1,h*.16,w*.28,h*.28);ctx.fillRect(w*.64,h*.16,w*.24,h*.32);ctx.fillStyle=p[2];ctx.fillRect(w*.2,h*.64,w*.55,h*.09);ctx.fillRect(w*.25,h*.73,w*.04,h*.12);ctx.fillRect(w*.66,h*.73,w*.04,h*.12);drawVacantFigures(ctx,w,h,3,h*.5)}
function drawCivicCorridor(ctx,w,h,p,t){ctx.fillStyle=p[1];ctx.beginPath();ctx.moveTo(w*.18,h*.1);ctx.lineTo(w*.82,h*.1);ctx.lineTo(w*.63,h*.88);ctx.lineTo(w*.37,h*.88);ctx.closePath();ctx.fill();ctx.strokeStyle=p[2];ctx.lineWidth=2;for(let i=0;i<12;i++){const yy=h*.16+i*h*.06;ctx.beginPath();ctx.moveTo(w*.18,yy);ctx.lineTo(w*.82,yy);ctx.stroke()}drawVacantFigures(ctx,w,h,2,h*.62)}
function drawVacantFigures(ctx,w,h,count,y){for(let i=0;i<count;i++){const x=w*(.18+i*(.64/Math.max(1,count-1)))+Math.sin(frame*.01+i)*6,scale=rand(.75,.98);ctx.fillStyle='rgba(36,32,27,.58)';ctx.beginPath();ctx.arc(x,y,w*.018*scale,0,Math.PI*2);ctx.fill();ctx.fillRect(x-w*.015*scale,y+w*.02,w*.03*scale,h*.095*scale);ctx.strokeStyle='rgba(36,32,27,.45)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x-w*.012,y+h*.105*scale);ctx.lineTo(x-w*.028,y+h*.17*scale);ctx.moveTo(x+w*.012,y+h*.105*scale);ctx.lineTo(x+w*.028,y+h*.17*scale);ctx.stroke()}}
function drawBaseFilmDirt(ctx,w,h){ctx.clearRect(0,0,w,h);for(let i=0;i<160;i++){ctx.fillStyle=`rgba(0,0,0,${rand(.015,.075)})`;ctx.beginPath();ctx.arc(rand(0,w),rand(0,h),rand(.3,2.2),0,Math.PI*2);ctx.fill()}ctx.fillStyle='rgba(0,0,0,.34)';ctx.fillRect(0,0,22,h);ctx.fillRect(w-22,0,22,h);ctx.fillStyle='rgba(0,0,0,.35)';for(let y=-20;y<h+40;y+=42){ctx.fillRect(9+Math.sin(frame*.03+y)*2,y,13,19);ctx.fillRect(w-22+Math.sin(frame*.03+y)*2,y+8,13,19)}}
function addScratchBurst(w,h,amount){const n=Math.floor(rand(2,8)+amount*24);for(let i=0;i<n;i++)scratchSeeds.push({x:rand(30,w-30),y:rand(-h*.2,h),len:rand(h*.25,h*1.2),drift:rand(-18,18),life:rand(18,80),width:Math.random()<.86?1:rand(1.5,4),alpha:rand(.08,.42)});scratchSeeds=scratchSeeds.slice(-180)}
function updateAndDrawScratches(ctx,w,h,highs,damageAmount){if(Math.random()<.18+highs*.58+damageAmount*.28)addScratchBurst(w,h,damageAmount);scratchSeeds=scratchSeeds.filter(s=>s.life>0);for(const s of scratchSeeds){s.life--;s.x+=rand(-.8,.8);s.y+=rand(-1.2,1.2);const a=clamp((s.life/70)*s.alpha*(1+highs),0,.55);ctx.strokeStyle=`rgba(255,246,220,${a})`;ctx.lineWidth=s.width;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.bezierCurveTo(s.x+s.drift*.4,s.y+s.len*.33,s.x-s.drift*.2,s.y+s.len*.66,s.x+s.drift,s.y+s.len);ctx.stroke()}}
function addPaintEvent(w,h,amount){paintEvents.push({x:rand(w*.08,w*.92),y:rand(h*.08,h*.92),r:rand(30,150)*(1+amount),life:rand(80,260),hue:rand(0,1),type:Math.random()<.45?'stroke':'bloom',spin:rand(-.03,.03)});paintEvents=paintEvents.slice(-95)}
function updateAndDrawPaint(ctx,w,h,bass,mids,act){if(Math.random()<.025+mids*.16+act.paint*.08)addPaintEvent(w,h,act.paint);paintEvents=paintEvents.filter(p=>p.life>0);for(const p of paintEvents){p.life--;const fade=clamp(p.life/200,0,1),alpha=fade*(.025+act.paint*.09+mids*.05),red=130+p.hue*120,green=35+(1-p.hue)*70,blue=18+Math.sin(p.hue*Math.PI)*45;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(frame*p.spin);if(p.type==='bloom'){const g=ctx.createRadialGradient(0,0,0,0,0,p.r*(1+bass));g.addColorStop(0,`rgba(${red},${green},${blue},${alpha*1.5})`);g.addColorStop(.45,`rgba(${red},${green},${blue},${alpha*.72})`);g.addColorStop(1,`rgba(${red},${green},${blue},0)`);ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,p.r*(1+bass*.7),0,Math.PI*2);ctx.fill()}else{ctx.strokeStyle=`rgba(${red},${green},${blue},${alpha*2.5})`;ctx.lineWidth=8+bass*44;ctx.lineCap='round';ctx.beginPath();for(let i=0;i<18;i++){const a=i/17*Math.PI*2,rr=p.r*(.25+i/17)*(.75+Math.sin(i*2.1+frame*.04)*.18),x=Math.cos(a)*rr,y=Math.sin(a*1.7)*rr*.52;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke()}ctx.restore()}}
function drawWaveEtching(ctx,w,h,mids,highs){if(!timeData)return;const rows=2+Math.floor(mids*9);ctx.strokeStyle=`rgba(255,232,188,${.025+highs*.18})`;ctx.lineWidth=1;for(let r=0;r<rows;r++){const yBase=h*((r+1)/(rows+1));ctx.beginPath();for(let x=0;x<w;x+=7){const idx=Math.floor((x/w)*timeData.length),v=(timeData[idx]-128)/128,y=yBase+v*(18+mids*95)+Math.sin(x*.022+frame*.035+r)*11;if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke()}}
function addBurn(w,h,bass,act){burnEvents.push({x:rand(w*.12,w*.88),y:rand(h*.12,h*.88),r:rand(80,240)*(1+bass+act.decay),life:rand(22,60),hot:rand(.2,.8)});burnEvents=burnEvents.slice(-12)}
function updateAndDrawBurns(ctx,w,h,bass,mids,act){if(Math.random()<.004+bass*.025+act.decay*.01)addBurn(w,h,bass,act);burnEvents=burnEvents.filter(b=>b.life>0);for(const b of burnEvents){b.life--;const f=clamp(b.life/60,0,1),r=b.r*(1.2-f*.25),g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,r);g.addColorStop(0,`rgba(255,248,216,${(.18+bass*.28)*f})`);g.addColorStop(.2,`rgba(238,118,43,${(.10+mids*.16)*f})`);g.addColorStop(.58,`rgba(91,28,10,${(.10+act.decay*.15)*f})`);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(b.x,b.y,r,0,Math.PI*2);ctx.fill()}}
function drawDust(ctx,w,h,highs,act){const n=24+Math.floor(highs*180+act.damage*90);ctx.fillStyle=`rgba(255,246,224,${.06+highs*.17})`;for(let i=0;i<n;i++){const r=Math.random()<.9?rand(.3,1.5):rand(2,6);ctx.beginPath();ctx.arc(rand(0,w),rand(0,h),r,0,Math.PI*2);ctx.fill()}if(Math.random()<.12+highs*.28+act.damage*.16){ctx.strokeStyle=`rgba(18,13,9,${.15+highs*.28})`;ctx.lineWidth=rand(.7,1.8);ctx.beginPath();let x=rand(w*.12,w*.88),y=rand(0,h);ctx.moveTo(x,y);for(let i=0;i<5;i++){x+=rand(-120,120);y+=rand(-80,80);ctx.quadraticCurveTo(x+rand(-90,90),y+rand(-90,90),x,y)}ctx.stroke()}}
function drawFrameInstability(ctx,w,h,bass,barPulse,act){if(barPulse||Math.random()<bass*.025){const hh=rand(3,22)*(1+act.damage);ctx.fillStyle=`rgba(255,244,215,${.055+bass*.18})`;ctx.fillRect(0,rand(0,h),w,hh)}if(Math.random()<act.decay*.035){ctx.fillStyle=`rgba(0,0,0,${rand(.1,.32)})`;ctx.fillRect(0,rand(0,h),w,rand(8,55))}}
function render(){requestAnimationFrame(render);const w=wrap.clientWidth,h=wrap.clientHeight;if(!isPlaying||!analyser){drawIdle(w,h);return}frame++;analyser.getByteFrequencyData(freqData);analyser.getByteTimeDomainData(timeData);const t=audio.currentTime,act=getAct(t),bass=clamp(bandAverage(35,165)*1.45,0,1),mids=clamp(bandAverage(520,2600)*1.18,0,1),highs=clamp(bandAverage(2600,9000)*1.55,0,1),energy=clamp(waveformRMS()*2.7,0,1),beat=Math.floor((t*BPM)/60),bar=Math.floor(beat/BEATS_PER_BAR),beatPulse=beat!==lastBeat,barPulse=bar!==lastBar;if(beatPulse){lastBeat=beat;if(bass>.32||act.damage>.5){gateX=rand(-8,8)*(bass+act.damage);gateY=rand(-5,5)*(bass+act.damage)}if(highs>.25)addScratchBurst(w,h,act.damage)}if(barPulse){lastBar=bar;if(Math.random()<.55+act.decay*.3)fauxSceneHold=0;if(Math.random()<.18+act.decay*.35)addBurn(w,h,bass,act)}gateX*=.82;gateY*=.82;drawFauxScene(scene,w,h,t,act,energy);damage.clearRect(0,0,w,h);damage.fillStyle=`rgba(6,3,1,${.018+act.decay*.024})`;damage.fillRect(0,0,w,h);updateAndDrawPaint(damage,w,h,bass,mids,act);updateAndDrawBurns(damage,w,h,bass,mids,act);updateAndDrawScratches(damage,w,h,highs,act.damage);drawWaveEtching(damage,w,h,mids,highs);drawDust(damage,w,h,highs,act);drawFrameInstability(damage,w,h,bass,barPulse,act);if(Math.random()<bass*.05+act.decay*.012){damage.fillStyle=`rgba(255,243,214,${.06+bass*.24})`;damage.fillRect(0,0,w,h)}drawBaseFilmDirt(dirt,w,h);if(t>285){const end=clamp((t-285)/39,0,1);scene.fillStyle=`rgba(238,229,199,${end*.16})`;scene.fillRect(0,0,w,h);damage.fillStyle=`rgba(255,248,226,${end*.045})`;damage.fillRect(0,0,w,h)}if(t>321.5){const end=clamp((t-321.5)/2.5,0,1);damage.fillStyle=`rgba(255,248,230,${(1-end)*.28})`;damage.fillRect(0,0,w,h);scene.fillStyle=`rgba(0,0,0,${end})`;scene.fillRect(0,0,w,h)}}
function drawIdle(w,h){idleFrame++;scene.fillStyle='#15100a';scene.fillRect(0,0,w,h);const g=scene.createRadialGradient(w*.5,h*.5,10,w*.5,h*.5,w*.72);g.addColorStop(0,'rgba(221,202,158,.12)');g.addColorStop(1,'rgba(0,0,0,.7)');scene.fillStyle=g;scene.fillRect(0,0,w,h);scene.fillStyle=`rgba(255,244,214,${.025+Math.sin(idleFrame*.04)*.015})`;scene.fillRect(0,0,w,h);damage.clearRect(0,0,w,h);for(let i=0;i<6;i++){damage.strokeStyle=`rgba(255,246,220,${rand(.02,.08)})`;damage.beginPath();const x=rand(0,w);damage.moveTo(x,0);damage.lineTo(x+rand(-20,20),h);damage.stroke()}drawBaseFilmDirt(dirt,w,h)}
async function start(){if(!audioCtx)setupAudio();if(audioCtx.state==='suspended')await audioCtx.resume();await audio.play();isPlaying=true;starter.style.display='none';btnPlay.textContent='⏸'}
startBtn.onclick=start;starter.onclick=e=>e.target===starter&&start();btnPlay.onclick=async()=>{if(audio.paused){await start()}else{audio.pause();isPlaying=false;btnPlay.textContent='▶'}};audio.addEventListener('ended',()=>{isPlaying=false;btnPlay.textContent='▶'});audio.addEventListener('loadedmetadata',()=>{tDur.textContent=fmt(audio.duration||TRACK_SECONDS)});audio.ontimeupdate=()=>{const dur=audio.duration||TRACK_SECONDS;tTime.textContent=fmt(audio.currentTime);tDur.textContent=fmt(dur);if(dur)rSeek.value=audio.currentTime/dur};rSeek.oninput=e=>{const dur=audio.duration||TRACK_SECONDS;if(dur)audio.currentTime=Number(e.target.value)*dur};rVol.oninput=e=>{const v=Number(e.target.value);audio.volume=v;if(gainNode)gainNode.gain.value=v};
render();
